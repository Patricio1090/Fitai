const CONFIG = {

// ── Precio configurable desde Netlify env var ────────────────────
async function initConfig() {
  try {
    const res = await fetch('/.netlify/functions/get-config');
    if (!res.ok) return;
    const cfg = await res.json();
    if (cfg.price_clp)   CONFIG.AMOUNT        = cfg.price_clp;
    if (cfg.price_display) CONFIG.PRICE_DISPLAY = cfg.price_display;
    // Sincronizar STATE en caso de que ya esté inicializado
    if (!STATE.couponApplied) STATE.couponFinalAmount = CONFIG.AMOUNT;
  } catch(e) {
    // Si falla, queda el valor por defecto hardcodeado
    console.warn('get-config no disponible, usando precio por defecto:', CONFIG.AMOUNT);
  }
}

const SUPA_URL = 'https://wnuehkewxbpahfbemliz.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndudWVoa2V3eGJwYWhmYmVtbGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc1NDcsImV4cCI6MjA4OTUwMzU0N30.CQ_pICuiWPwUhMrsCl7csOzMZR3cYZuaLcMelJnnyRI';

  if (!supa && SUPA_URL !== 'https://TU-PROYECTO.supabase.co') {

async function dbSaveUser(user) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').upsert({
      email: user.email, name: user.name,
      password_hash: user.passwordHash, paid: user.paid || false,
      setup_done: false, created_at: new Date().toISOString(),
    }, { onConflict: 'email' });
  } catch(e) { console.log('DB save user error:', e); }
}

async function dbMarkPaid(email) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').update({ paid: true, paid_at: new Date().toISOString() }).eq('email', email);
    await supa.from('payments').insert({ user_email: email, amount: CONFIG.AMOUNT, currency: CONFIG.CURRENCY, status: 'approved', created_at: new Date().toISOString() });
  } catch(e) { console.log('DB mark paid error:', e); }
}

async function dbMarkSetupDone(email, goal) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').update({ setup_done: true, goal: goal, last_active: new Date().toISOString() }).eq('email', email);

  initSupabase(); if (!supa) return;

    await supa.from('daily_logs').upsert({

      plan: STATE.plan, nutrition: STATE.nutrition, chat: STATE.chat,

async function claude(messages, max=1000) {
  const today = new Date().toLocaleDateString('es-CL');
  const usageKey = 'fitai_usage_' + today;
  const usage = parseInt(localStorage.getItem(usageKey)||'0');
  if (usage >= 8) return '⚠️ Alcanzaste el límite de 8 consultas de IA por hoy. Vuelve mañana 💪';
  localStorage.setItem(usageKey, usage + 1);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ['sk-ant-api03-EneV_RhMnIgQ0Cld0vq2-eGUDOozaDlRxRFpPljFOoTAJbSUfu-G0hhMTl5IdrVPG97uUlE0z881_Z-','tHnI74A-h3O5eQAA'].join(''),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:max, system:getSYS(), messages })
    });
    const d = await res.json();
    if (d.error) return '⚠️ Error: ' + d.error.message;
    return d.content?.map(b=>b.text||'').join('')||'⚠️ Sin respuesta';
  } catch(e) { return '⚠️ Error de conexión: ' + e.message; }
}

// ── Auth ──────────────────────────────────────────────────────
async function authRegister(email, password, name, phone='') {
  if (email === 'admin@fitai.cl') throw new Error('Email reservado.');
  initSupabase();
  if (!supa) throw new Error('Error de conexión.');
  const { data: existing } = await supa.from('users').select('email').eq('email', email).single();
  if (existing) throw new Error('Este email ya está registrado.');
  const { error } = await supa.from('users').insert({
    email, name, password_hash: btoa(password),
    paid: false, setup_done: false, created_at: new Date().toISOString(),
  });
  if (error) throw new Error('Error al registrar: ' + error.message);
  // Obtener el id generado
  const { data: newRow } = await supa.from('users').select('id').eq('email', email).single();
  const user = { id: newRow?.id||null, email, name, paid: false, token: btoa(email+':'+Date.now()) };
  const users = JSON.parse(localStorage.getItem('fitai_users')||'{}');
  users[email] = { ...user, passwordHash: btoa(password) };
  localStorage.setItem('fitai_users', JSON.stringify(users));
  return user;
}

async function authLogin(email, password) {
  if (email === 'admin@fitai.cl' && password === 'fitai2024admin') {
    return { id: null, email:'admin@fitai.cl', name:'Admin', paid:true, token:'admin-token' };
  }
  const TEST_USERS = {
    'test1@fitai.cl':{name:'Test Usuario 1',pass:'fitai_test_1'},
    'test2@fitai.cl':{name:'Test Usuario 2',pass:'fitai_test_2'},
    'test3@fitai.cl':{name:'Test Usuario 3',pass:'fitai_test_3'},
    'test4@fitai.cl':{name:'Test Usuario 4',pass:'fitai_test_4'},
    'test5@fitai.cl':{name:'Test Usuario 5',pass:'fitai_test_5'},
  };
  if (TEST_USERS[email] && TEST_USERS[email].pass === password) {
    return { id: null, email, name:TEST_USERS[email].name, paid:true, token:'test-token-'+email };
  }
  initSupabase();
  if (!supa) {
    const users = JSON.parse(localStorage.getItem('fitai_users')||'{}');
    const u = users[email];
    if (!u) throw new Error('Email no encontrado.');
    if (u.passwordHash !== btoa(password)) throw new Error('Contraseña incorrecta.');
    return { id: u.id||null, email:u.email, name:u.name, paid:u.paid, token:u.token };
  }
  const { data:u, error } = await supa.from('users').select('*').eq('email', email).single();
  if (error || !u) throw new Error('Email no encontrado.');
  if (u.password_hash !== btoa(password)) throw new Error('Contraseña incorrecta.');
  const users = JSON.parse(localStorage.getItem('fitai_users')||'{}');
  users[email] = { id:u.id, email:u.email, name:u.name, paid:u.paid, passwordHash:u.password_hash, token:btoa(email+':'+Date.now()) };
  localStorage.setItem('fitai_users', JSON.stringify(users));
  return { id:u.id, email:u.email, name:u.name, paid:u.paid, token:btoa(email+':'+Date.now()) };
}

async function loadProfileFromSupabase(email) {
  initSupabase(); if (!supa) return;
  try {
    const { data:u } = await supa.from('users').select('*').eq('email', email).single();
    if (u && u.setup_done && u.goal) {
      STATE.profile = {
        name:u.name, goal:u.goal, age:u.age, gender:u.gender,
        weight:u.weight_initial||u.weight, height:u.height,
        targetWeight:u.target_weight, weeksGoal:u.weeks_goal,
        activityLevel:u.activity_level, trainingPlace:u.training_place,
        bodyFat:u.body_fat, setup:true
      };
    }
    if (u && u.paid) STATE.user.paid = true;
    if (u && u.id && STATE.user) STATE.user.id = u.id;
    if (u && u.current_plan)        STATE.plan           = u.current_plan;
    if (u && u.current_nutrition)   STATE.nutrition      = u.current_nutrition;
    if (u && u.plan_generated_at)   STATE.planGeneratedAt= u.plan_generated_at;
    const { data:logs } = await supa.from('daily_logs').select('*').eq('user_email', email).order('date', {ascending:false}).limit(90);
    if (logs && logs.length > 0) {
      STATE.dailyLogs = logs.map(l => ({
        date:l.date, weight:l.weight, bodyFat:l.body_fat,
        calories:l.calories, protein:l.protein, sleep:l.sleep,
        water:l.water, training:l.training, energy:l.energy, notes:l.notes
      }));
    }
    save();
  } catch(e) { console.log('loadProfile error:', e); }
}

function markAsPaid(email) {
  const users = JSON.parse(localStorage.getItem('fitai_users')||'{}');
  if (users[email]) { users[email].paid = true; localStorage.setItem('fitai_users', JSON.stringify(users)); }
  if (STATE.user) STATE.user.paid = true;
  save(); dbMarkPaid(email);
}

// ── Pago con MercadoPago ────────────────────────────────────────
async function processPayment() {
  STATE.payLoading = true;
  STATE.payError = '';
  render();
  try {
    if (!CONFIG.MP_PUBLIC_KEY || CONFIG.MP_PUBLIC_KEY === 'APP_USR-TU-PUBLIC-KEY-AQUI') {
      await new Promise(r => setTimeout(r, 1800));
      markAsPaid(STATE.user.email);
      STATE.screen = 'setup';
      STATE.payLoading = false;
      render(); return;
    }
    const res = await fetch(CONFIG.PAYMENT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        // ── create-preference.js espera user_id y user_email ──
        user_id:    STATE.user.id || STATE.user.email,
        user_email: STATE.user.email,
        coupon_code: STATE.couponApplied ? STATE.couponCode : '',
      })
    });
    const data = await res.json();
    if (!data.init_point && !data.initPoint && !data.sandboxInitPoint) throw new Error('No se pudo crear el pago.');
    localStorage.setItem('fitai_pending_email', STATE.user.email);
    localStorage.setItem('fitai_pending_user', JSON.stringify(STATE.user));
    window.location.href = data.init_point || data.initPoint || data.sandboxInitPoint;
  } catch(e) {
    STATE.payError = e.message || 'Error al conectar con MercadoPago. Intenta de nuevo.';
    STATE.payLoading = false;
    render();
  }
}

// ── Progreso ────────────────────────────────────────────────────
function calcProgress() {
  const logs = STATE.dailyLogs;
  const sw = parseFloat(STATE.profile?.weight)||0;
  const tw = parseFloat(STATE.profile?.targetWeight)||sw;
  const lw = logs.length ? (parseFloat(logs[0]?.weight)||sw) : sw;
  const lost = sw - lw;
  const total = sw - tw;
  const pct = total !== 0 ? Math.min(100, (lost/total)*100) : 0;
  const retroceso = logs.length > 0 && lost < 0;
  const trend = logs.slice(0,14).reverse().map(l=>({date:l.date,w:parseFloat(l.weight)||null})).filter(l=>l.w);
  return { lost:lost.toFixed(1), pct:pct.toFixed(0), days:logs.length, trend, lw:lw||sw, retroceso, pesoInicial:sw };
}

function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';
  root.style.position = 'relative';
  if (STATE.screen === 'auth')    { root.appendChild(renderAuth());    return; }
  if (STATE.screen === 'paywall') { root.appendChild(renderPaywall()); return; }
  if (STATE.screen === 'setup' && !STATE.profile) { root.appendChild(renderSetup()); return; }
  if (STATE.sideSection) { root.appendChild(renderSideSection()); root.appendChild(renderTabBar()); return; }
  root.appendChild(renderHeader());

function renderAuth() {

  div.innerHTML=`<div class="screen-logo">⚡</div>

    <div class="screen-sub">Tu entrenador personal con IA · Solo ${CONFIG.PRICE_DISPLAY} CLP</div>

      </div>
      <div class="err ${STATE.authError?'show':''}">${STATE.authError}</div>
      ${STATE.authMode==='register'?`<div class="field"><label>Tu nombre</label><input type="text" id="auth-name" placeholder="Nombre completo"/></div><div class="field"><label>Teléfono (WhatsApp)</label><input type="tel" id="auth-phone" placeholder="+56 9 1234 5678"/></div>`:''}
      <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="tu@email.com"/></div>
      <div class="field"><label>Contraseña</label><input type="password" id="auth-pass" placeholder="••••••••"/></div>
      <button class="btn btn-lime" id="btn-auth" ${STATE.authLoading?'disabled':''}>
        ${STATE.authLoading?'Cargando…':STATE.authMode==='login'?'Ingresar →':'Crear cuenta →'}
      </button>
      ${STATE.authMode==='login'?`<p style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">¿No tienes cuenta? <button class="link-btn" id="to-reg">Regístrate aquí</button></p>`:`<p style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">¿Ya tienes cuenta? <button class="link-btn" id="to-login">Ingresa aquí</button></p>`}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:16px;text-align:center">🔒 Tus datos están seguros y cifrados</p>`;
  div.querySelector('#tab-login').onclick=()=>{STATE.authMode='login';STATE.authError='';render();};
  div.querySelector('#tab-reg').onclick=()=>{STATE.authMode='register';STATE.authError='';render();};
  div.querySelector('#to-reg')?.addEventListener('click',()=>{STATE.authMode='register';STATE.authError='';render();});
  div.querySelector('#to-login')?.addEventListener('click',()=>{STATE.authMode='login';STATE.authError='';render();});
  div.querySelector('#btn-auth').onclick=async()=>{
    const email=div.querySelector('#auth-email')?.value?.trim();
    const pass=div.querySelector('#auth-pass')?.value;
    const name=div.querySelector('#auth-name')?.value?.trim();
    const phone=div.querySelector('#auth-phone')?.value?.trim()||'';
    if (!email||!pass){STATE.authError='Completa todos los campos.';render();return;}
    STATE.authLoading=true; STATE.authError=''; render();
    try {
      if (STATE.authMode==='register'){if(!name)throw new Error('Ingresa tu nombre.');STATE.user=await authRegister(email,pass,name,phone);}
      else STATE.user=await authLogin(email,pass);
      save();
      await loadProfileFromSupabase(STATE.user.email);
      STATE.screen=!STATE.profile?'setup':!STATE.user.paid?'paywall':'app';
    } catch(e){ STATE.authError=e.message; }
    STATE.authLoading=false; render();
  };
  div.querySelector('#auth-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')div.querySelector('#btn-auth')?.click();});
  return div;
}

    <div class="screen-title">Activa tu plan</div>
    <div class="screen-sub">Hola, ${STATE.user?.name}. Un único pago para acceso completo de por vida.</div>

      <div class="paywall-period">pesos chilenos · pago único · acceso de por vida</div>

        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${['💳 Débito / Crédito','🔵 Redcompra','💰 Saldo MercadoPago','🏦 Transferencia','🏪 Efectivo'].map(m=>`<span style="background:var(--border);color:var(--muted);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600">${m}</span>`).join('')}
        </div>
      </div>

      <div class="err ${STATE.payError?'show':''}">${STATE.payError}</div>

      <!-- ── CUPÓN DE DESCUENTO ── -->
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;text-align:left">
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600">🏷️ ¿Tienes un cupón de descuento?</div>
        <div style="display:flex;gap:8px">
          <input type="text" id="coupon-input" placeholder="Ingresa tu cupón" value="${STATE.couponCode}"
            style="flex:1;text-transform:uppercase;font-size:13px;padding:10px 12px"/>
          <button id="btn-apply-coupon" class="btn btn-sm" style="background:var(--purple);color:#fff;white-space:nowrap;border-radius:10px;padding:10px 14px;font-size:12px;margin:0;width:auto">
            ${STATE.couponApplied ? '✕ Quitar' : 'Aplicar'}
          </button>
        </div>
        <div id="coupon-msg" style="font-size:11px;margin-top:6px;${STATE.couponApplied?'display:block;color:var(--green)':STATE.payError?'display:none':'display:none'}">
          ${STATE.couponApplied ? `✅ ${STATE.couponData?.message||'Cupón aplicado'}` : ''}
        </div>
      </div>

      <!-- Resumen de precio con descuento -->
      <div id="price-summary" style="display:${STATE.couponApplied?'block':'none'};background:#34d39915;border:1px solid #34d39930;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;text-align:left">
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Precio original:</span><span style="text-decoration:line-through;color:var(--muted)">${CONFIG.PRICE_DISPLAY}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--green)">Descuento:</span><span style="color:var(--green)">-$${(STATE.couponDiscount||0).toLocaleString('es-CL')}</span></div>
        <div style="display:flex;justify-content:space-between;font-weight:800;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)"><span>Total:</span><span style="color:var(--lime)">$${(STATE.couponFinalAmount||CONFIG.AMOUNT).toLocaleString('es-CL')}</span></div>
      </div>

      <button class="btn btn-lime" id="btn-pay" ${STATE.payLoading?'disabled':''}>
        ${STATE.payLoading
          ? '⏳ Conectando con MercadoPago…'
          : isDemo
            ? '⚡ Pagar (modo demo)'
            : STATE.couponApplied
              ? `⚡ Ir a pagar $${STATE.couponFinalAmount.toLocaleString('es-CL')} CLP →`
              : `⚡ Ir a pagar ${CONFIG.PRICE_DISPLAY} ${CONFIG.CURRENCY} →`}
      </button>

      ${isDemo?`<div style="background:#fbbf2410;border:1px solid #fbbf2430;border-radius:10px;padding:10px;margin-top:10px;font-size:11px;color:var(--amber);text-align:center">⚠️ Modo demo activo.</div>`:''}
      <div class="secure-badge" style="margin-top:14px">🔒 Pago 100% seguro con MercadoPago</div>
    </div>
    <button class="btn btn-ghost" style="max-width:420px;margin-top:8px" id="btn-logout-pay">← Cambiar cuenta</button>`;

  div.querySelector('#btn-pay').onclick = processPayment;
  div.querySelector('#btn-logout-pay').onclick = () => { STATE.user=null; STATE.screen='auth'; save(); render(); };

  // ── Handler del cupón → llama a validate-coupon function ──
  div.querySelector('#btn-apply-coupon').onclick = async () => {
    const msgEl = div.querySelector('#coupon-msg');

    // Si ya hay cupón aplicado, quitarlo
    if (STATE.couponApplied) {
      STATE.couponApplied = false;
      STATE.couponCode = '';
      STATE.couponData = null;
      STATE.couponDiscount = 0;
      STATE.couponFinalAmount = CONFIG.AMOUNT;
      render(); return;
    }

    const code = div.querySelector('#coupon-input')?.value?.trim().toUpperCase();
    if (!code) {
      msgEl.style.display='block'; msgEl.style.color='#f87171';
      msgEl.textContent='Ingresa un código de cupón'; return;
    }

    msgEl.style.display='block'; msgEl.style.color='var(--muted)';
    msgEl.textContent='Verificando cupón…';
    div.querySelector('#btn-apply-coupon').disabled = true;

    try {
      // Llamar a la función Netlify validate-coupon
      const res = await fetch(CONFIG.VALIDATE_COUPON_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });
      const data = await res.json();

      if (data.valid) {
        STATE.couponApplied   = true;
        STATE.couponCode      = data.code;
        STATE.couponData      = data;
        STATE.couponDiscount  = data.discount_amount;
        STATE.couponFinalAmount = data.final_price;
        render(); // re-renderiza con el estado del cupón actualizado
      } else {
        STATE.couponApplied = false;
        msgEl.style.color='#f87171';
        msgEl.style.display='block';
        msgEl.textContent='❌ ' + (data.error || 'Cupón no válido o expirado');
        div.querySelector('#btn-apply-coupon').disabled = false;
      }
    } catch(e) {
      msgEl.style.color='#f87171'; msgEl.style.display='block';
      msgEl.textContent='Error al verificar el cupón. Intenta de nuevo.';
      div.querySelector('#btn-apply-coupon').disabled = false;
    }
  };

  return div;
}

// ── Setup ────────────────────────────────────────────────────────
const STEPS=[
  {key:'name',q:'¿Cuál es tu nombre?',type:'text',ph:'Tu nombre'},
  {key:'age',q:'¿Cuántos años tienes?',type:'number',ph:'Ej: 28'},
  {key:'gender',q:'¿Cuál es tu sexo biológico?',type:'select',opts:['Masculino','Femenino']},
  {key:'weight',q:'¿Cuál es tu peso actual? (kg)',type:'number',ph:'Ej: 82'},
  {key:'height',q:'¿Cuál es tu altura? (cm)',type:'number',ph:'Ej: 175'},
  {key:'bodyFat',q:'¿Sabes tu % de grasa corporal? (opcional)',type:'number',ph:'Deja vacío si no sabes'},
  {key:'goal',q:'¿Cuál es tu objetivo principal?',type:'select',opts:['🔥 Quemar grasa','💪 Ganar masa muscular','⚡ Ambos (recomposición)']},
  {key:'targetWeight',q:'¿Cuál es tu peso objetivo? (kg)',type:'number',ph:'Ej: 72'},
  {key:'weeksGoal',q:'¿En cuántas semanas quieres lograrlo?',type:'number',ph:'Ej: 12'},
  {key:'activityLevel',q:'¿Cuál es tu nivel de actividad actual?',type:'select',opts:['Sedentario (sin ejercicio)','Ligero (1-2 días/sem)','Moderado (3-4 días/sem)','Activo (5+ días/sem)','Atleta (2x/día)']},
  {key:'trainingPlace',q:'¿Dónde entrenas habitualmente?',type:'select',opts:['🏋️ En el gimnasio (con equipamiento completo)','🏠 En casa (con equipamiento limitado o sin equipamiento)','🏋️🏠 Ambos (gimnasio y casa)']},
];

function renderSetup() {
  const wrap=document.createElement('div'); wrap.className='setup-wrap';
  if (STATE.aiLoading) {
    wrap.innerHTML=`<div style="text-align:center;padding-top:60px"><div style="font-size:56px;margin-bottom:16px">🧠</div><div style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:var(--purple)">Generando tu plan…</div><div style="color:var(--muted);font-size:13px;margin-top:8px">Analizando con principios de Harvard</div><div style="display:flex;justify-content:center;gap:8px;margin-top:24px"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    return wrap;
  }
  const step=STEPS[STATE.setupStep];
  const pct=(STATE.setupStep/STEPS.length)*100;
  wrap.innerHTML=`<div class="screen-logo">🏋️</div>
    <div class="screen-title">Configura tu plan</div>
    <div class="screen-sub">Hola ${STATE.user?.name}! Cuéntanos sobre ti.</div>
    <div style="width:100%;max-width:440px;margin-top:20px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:var(--muted)">Configuración inicial</span><span style="font-size:11px;color:var(--purple)">${STATE.setupStep+1}/${STEPS.length}</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--purple),#7c3aed)"></div></div>
    </div>
    <div class="setup-card">
      <div style="font-size:12px;color:var(--purple);font-weight:700;margin-bottom:14px">Paso ${STATE.setupStep+1}</div>
      <div style="font-family:Syne,sans-serif;font-size:17px;font-weight:700;margin-bottom:20px;line-height:1.4">${step.q}</div>
      <div id="step-inp"></div>
      <button class="btn btn-purple" id="btn-next" style="margin-top:16px">${STATE.setupStep===STEPS.length-1?'🚀 Generar mi plan':'Continuar →'}</button>
      ${STATE.setupStep>0?`<button class="btn btn-ghost" id="btn-back">← Atrás</button>`:''}
    </div>`;
  const inp=wrap.querySelector('#step-inp');
  if (step.type==='select') {
    step.opts.forEach(o=>{const b=document.createElement('button');b.className='option-btn'+(STATE.setupData[step.key]===o?' selected':'');b.textContent=o;b.onclick=()=>{STATE.setupData[step.key]=o;render();};inp.appendChild(b);});
  } else {
    const el=document.createElement('input');el.type=step.type;el.placeholder=step.ph;el.value=STATE.setupData[step.key]||'';el.style.cssText='width:100%';
    el.oninput=e=>STATE.setupData[step.key]=e.target.value;
    el.onkeydown=e=>{if(e.key==='Enter')wrap.querySelector('#btn-next')?.click();};
    inp.appendChild(el);setTimeout(()=>el.focus(),100);
  }
  wrap.querySelector('#btn-next').onclick=async()=>{
    const val=STATE.setupData[step.key];
    if(step.key!=='bodyFat'&&!val){inp.querySelector('input,select')?.focus();return;}
    if(STATE.setupStep<STEPS.length-1){STATE.setupStep++;render();}
    else {
      const p=STATE.setupData;
      STATE.profile={...p,setup:true};
      dbMarkSetupDone(STATE.user?.email,p.goal);
      if(supa){await supa.from('users').update({goal:p.goal,age:parseInt(p.age),gender:p.gender,weight_initial:parseFloat(p.weight),weight:parseFloat(p.weight),height:parseFloat(p.height),target_weight:parseFloat(p.targetWeight),weeks_goal:parseInt(p.weeksGoal),activity_level:p.activityLevel,training_place:p.trainingPlace,body_fat:parseFloat(p.bodyFat)||null,setup_done:true,last_active:new Date().toISOString()}).eq('email',STATE.user?.email);}
      save();
      if(!STATE.user.paid){STATE.screen='paywall';render();return;}
      STATE.aiLoading=true;render();
      const desc=`${p.name},${p.age}años,${p.gender},${p.weight}kg,${p.height}cm,objetivo:${p.goal},meta:${p.targetWeight}kg en ${p.weeksGoal} semanas,actividad:${p.activityLevel}`;
      const withTimeout=(promise,ms)=>Promise.race([promise,new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),ms))]);
      try {
        STATE.plan=await withTimeout(claude([{role:'user',content:`Plan entrenamiento semanal para ${desc}, lugar: ${p.trainingPlace||'gimnasio'}. ${getTrainingPrompt(p.trainingPlace)} Máx 250 palabras.`}]),25000);
        STATE.nutrition=await withTimeout(claude([{role:'user',content:`Plan alimentación diario para ${desc}. Formato: ## Desayuno, ## Colación AM, ## Almuerzo, ## Merienda PM, ## Cena. Solo alimentos con cantidades. Máx 200 palabras.`}]),25000);
        STATE.planGeneratedAt=new Date().toISOString();
        STATE.screen='app';
        dbSavePlanNutrition(STATE.user?.email,STATE.plan,STATE.nutrition);
      } catch(e) {
        STATE.plan='⚠️ Hubo un problema. Toca "🔄 Nueva semana" para generarlo.';
        STATE.nutrition='⚠️ Hubo un problema. Toca "🔄 Nuevo menú" para generarlo.';
        STATE.screen='app';
      }
      STATE.aiLoading=false;save();render();
    }
  };
  wrap.querySelector('#btn-back')?.addEventListener('click',()=>{STATE.setupStep--;render();});
  return wrap;
}

    ${STATE.aiMsg?`<div class="card" style="background:linear-gradient(135deg,${prog.retroceso?'#f8717112':'#34d39912'},var(--surface));border:1px solid ${prog.retroceso?'#f8717128':'#34d39928'}"><div class="card-sh">${prog.retroceso?'⚠️ Alerta de la IA':'🧠 Análisis de hoy'}</div><div class="ai-text">${STATE.aiMsg}</div></div>`:''}

function formatPlanWithImages(planText){if(!planText)return'';const lines=planText.split('\n');let html='';for(const line of lines){const trimmed=line.trim();if(!trimmed){html+='<div style="height:6px"></div>';continue;}if(/^#{1,3}\s/.test(trimmed)||/^\*\*DÍA/i.test(trimmed)||/^DÍA\s/i.test(trimmed)||/^\*\*Día/i.test(trimmed)){const clean=trimmed.replace(/^#+\s*/,'').replace(/\*\*/g,'').trim();html+=`<div class="plan-section-title">${clean}</div>`;continue;}const exMatch=trimmed.match(/^[-–•*]\s*(.+)|^(\d+)[.)]\s*(.+)/);if(exMatch){const exText=(exMatch[1]||exMatch[3]||'').replace(/\*\*/g,'').trim();const exKey=matchExerciseKey(exText);if(exKey){let name=exText,detail='';const parenIdx=exText.indexOf('(');const dashIdx=exText.indexOf(' - ');const colonIdx=exText.indexOf(':');if(parenIdx>3){name=exText.slice(0,parenIdx).trim();detail=exText.slice(parenIdx).trim();}else if(dashIdx>3){name=exText.slice(0,dashIdx).trim();detail=exText.slice(dashIdx+3).trim();}else if(colonIdx>3){name=exText.slice(0,colonIdx).trim();detail=exText.slice(colonIdx+1).trim();}html+=buildExerciseCard(name,detail,exKey);continue;}}const formatted=trimmed.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^#+\s*/,'');html+=`<div class="plan-text-line">${formatted}</div>`;}return html;}

function matchFoodsInText(text){const lower=text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");const found=[];const seen=new Set();for(const f of FOOD_MATCH){for(const kw of f.kw){const n=kw.normalize("NFD").replace(/[\u0300-\u036f]/g,"");if(lower.includes(n)&&!seen.has(f.key)){seen.add(f.key);found.push(f.key);break;}}}return found;}

function matchNutSection(text){const lower=text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");const matches=[{key:"desayuno",kw:["desayuno","breakfast"]},{key:"almuerzo",kw:["almuerzo","lunch","comida principal"]},{key:"cena",kw:["cena","dinner"]},{key:"snack",kw:["snack","merienda de la tarde"]},{key:"merienda",kw:["merienda","media mañana","media manana","media tarde","colación am","colacion am"]},{key:"colacion",kw:["colación","colacion"]},{key:"pre_entreno",kw:["pre-entreno","pre entreno","antes de entrenar"]},{key:"post_entreno",kw:["post-entreno","post entreno","después de entrenar","despues de entrenar"]},{key:"calorias",kw:["calorías","calorias","macros diarios","macros"]},{key:"proteina",kw:["proteína total","proteina total"]},{key:"hidratacion",kw:["agua","hidratación","hidratacion"]},{key:"suplementos",kw:["suplemento"]}];let best=null,bestLen=0;for(const m of matches){for(const k of m.kw){const n=k.normalize("NFD").replace(/[\u0300-\u036f]/g,"");if(lower.includes(n)&&k.length>bestLen){best=m.key;bestLen=k.length;}}}return best;}
function buildNutCard(name,items,nutKey){const data=NUT_ITEMS[nutKey];if(!data)return'';const c=data.color;const allText=name+' '+(Array.isArray(items)?items.join(' '):items);const foods=matchFoodsInText(allText);const hasFoods=foods.length>0;const foodData=hasFoods?`data-foods="${foods.join(',')}" data-mealname="${name}" data-mealcolor="${c}"`:'';const itemsArr=Array.isArray(items)?items:(items?[items]:[]);const itemsHtml=itemsArr.filter(Boolean).map(it=>`<div class="meal-card-item"><div class="meal-card-dot" style="background:${c}"></div>${it}</div>`).join('');return`<div class="meal-card" style="border-color:${c}20" ${foodData} ${hasFoods?'onclick="openFoodModal(this)"':''}><div class="meal-card-header"><div class="meal-card-icon">${data.icon}</div><div class="meal-card-title"><div class="meal-card-name" style="color:${c}">${name}</div>${itemsArr.length>0?`<div class="meal-card-sub">${itemsArr.length} alimento${itemsArr.length>1?'s':''}</div>`:''}</div>${hasFoods?`<div class="meal-card-arrow" style="color:${c}">📷 ›</div>`:''}</div>${itemsArr.length>0?`<div class="meal-card-items">${itemsHtml}</div>`:''}</div>`;}
function openFoodModal(el){const foods=el.dataset.foods.split(',');const mealName=el.dataset.mealname;const color=el.dataset.mealcolor;const existing=document.querySelector('.ex-modal-overlay');if(existing)existing.remove();const overlay=document.createElement('div');overlay.className='ex-modal-overlay';const foodCards=foods.map(fk=>{const fd=FOOD_IMAGES[fk];if(!fd)return'';return`<div style="text-align:center"><img src="https://images.unsplash.com/${fd.img}?w=400&h=300&fit=crop&auto=format&q=80" alt="${fd.label}" loading="lazy" onerror="this.parentElement.style.display='none'" style="width:100%;border-radius:14px;aspect-ratio:4/3;object-fit:cover;background:#1a1735;border:1px solid ${color}20"/><div style="font-size:12px;color:#e2e8f0;font-weight:600;margin-top:6px">${fd.label}</div></div>`;}).filter(Boolean).join('');overlay.innerHTML=`<div class="ex-modal"><div class="ex-modal-close"><button onclick="closeExerciseModal()">✕</button></div><div class="ex-modal-header"><div class="ex-modal-title" style="color:${color}">${mealName}</div><div class="ex-modal-muscle" style="color:${color}cc">${foods.length} alimento${foods.length>1?'s':''}</div></div><div style="display:grid;grid-template-columns:repeat(${foods.length>1?2:1},1fr);gap:10px;padding:0 16px 20px">${foodCards}</div><div style="padding:0 20px 20px;text-align:center"><button class="btn btn-ghost btn-sm" onclick="closeExerciseModal()" style="width:100%">Cerrar</button></div></div>`;overlay.onclick=(e)=>{if(e.target===overlay)closeExerciseModal();};document.body.appendChild(overlay);requestAnimationFrame(()=>overlay.classList.add('open'));}
const SKIP_NUT=["lista de compra","ingrediente","elaboración","elaboracion","preparación","preparacion","receta","instrucciones","pasos","modo de preparar","cómo preparar","como preparar"];
function shouldSkipSection(text){const l=text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");return SKIP_NUT.some(s=>l.includes(s.normalize("NFD").replace(/[\u0300-\u036f]/g,"")));}
function formatNutritionWithCards(nutText){if(!nutText)return'';const lines=nutText.split('\n');let html='';let currentMeal=null;let mealItems=[];let skipping=false;function flushMeal(){if(currentMeal&&mealItems.length>0){html+=buildNutCard(currentMeal.name,mealItems,currentMeal.key);}else if(currentMeal){html+=buildNutCard(currentMeal.name,[],currentMeal.key);}currentMeal=null;mealItems=[];}for(const line of lines){const trimmed=line.trim();if(!trimmed)continue;if(trimmed.startsWith('|')||/^[-|]+$/.test(trimmed.replace(/\s/g,'')))continue;const timeMatch=trimmed.match(/^\*{0,2}\s*\*?\s*(\d{1,2}:\d{2})\s*[-–]\s*(.+)/);if(timeMatch){flushMeal();const mealLabel=timeMatch[2].replace(/\*\*/g,'').replace(/\([\d\s,kcal]+\)/gi,'').trim();const fullLabel=timeMatch[1]+' - '+timeMatch[2].replace(/\*\*/g,'').trim();if(shouldSkipSection(mealLabel)){skipping=true;continue;}skipping=false;const nutKey=matchNutSection(mealLabel);if(nutKey){currentMeal={name:fullLabel,key:nutKey};continue;}else{html+=`<div class="plan-section-title nut">${fullLabel}</div>`;continue;}}const isHeader=/^#{1,3}\s/.test(trimmed)||/^\*\*[A-ZÁÉÍÓÚÑ🌅☀️🌙🍎⚡💪📊🔥🥤💧💊]/.test(trimmed);if(isHeader){flushMeal();const clean=trimmed.replace(/^#+\s*/,'').replace(/\*\*/g,'').replace(/^[🌅☀️🌙🍎⚡💪📊🔥🥤💧💊🛒📝👩‍🍳]\s*/,'').trim();if(shouldSkipSection(clean)){skipping=true;continue;}skipping=false;const nutKey=matchNutSection(clean);if(nutKey){currentMeal={name:clean,key:nutKey};continue;}else{html+=`<div class="plan-section-title nut">${clean}</div>`;continue;}}if(skipping)continue;const lineMatch=trimmed.match(/^[-–•*]\s*(.+)|^(\d+)[.)]\s*(.+)/);if(lineMatch){const itemText=(lineMatch[1]||lineMatch[3]||'').replace(/\*\*/g,'').trim();if(currentMeal){mealItems.push(itemText);continue;}const nutKey=matchNutSection(itemText);if(nutKey){const ci=itemText.indexOf(':');if(ci>2)html+=buildNutCard(itemText.slice(0,ci).trim(),[itemText.slice(ci+1).trim()],nutKey);else html+=buildNutCard(itemText,[],nutKey);continue;}if(!currentMeal){html+=`<div class="plan-text-line" style="padding-left:8px">• ${itemText}</div>`;continue;}}if(!currentMeal){const nutKey2=matchNutSection(trimmed);if(nutKey2&&(trimmed.includes(':')||/^[A-ZÁÉÍÓÚÑ🌅☀️🌙🍎⚡💪]/.test(trimmed))){if(shouldSkipSection(trimmed)){skipping=true;continue;}flushMeal();const ci=trimmed.indexOf(':');if(ci>2){currentMeal={name:trimmed.slice(0,ci).replace(/\*\*/g,'').trim(),key:nutKey2};const a=trimmed.slice(ci+1).replace(/\*\*/g,'').trim();if(a)mealItems.push(a);}else{currentMeal={name:trimmed.replace(/\*\*/g,'').trim(),key:nutKey2};}continue;}}if(currentMeal){mealItems.push(trimmed.replace(/\*\*/g,'').trim());continue;}const formatted=trimmed.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^#+\s*/,'');html+=`<div class="plan-text-line">${formatted}</div>`;}flushMeal();return html;}

function getTrainingPrompt(tp){if(tp?.includes('Ambos'))return'Ejercicios para AMBOS contextos: indica para cada ejercicio la versión de gimnasio Y la alternativa para casa. Formato: "Ejercicio (Gym: X / Casa: Y)".';if(tp?.includes('casa'))return'Ejercicios SIN equipamiento de gimnasio, solo peso corporal o materiales caseros.';return'Ejercicios con equipamiento completo de gimnasio.';}
function getWeekNumber(){if(!STATE.planGeneratedAt&&STATE.dailyLogs.length===0)return 1;const first=STATE.planGeneratedAt?new Date(STATE.planGeneratedAt):new Date();const now=new Date();const diffDays=Math.floor((now-first)/(1000*60*60*24));return Math.max(1,Math.ceil((diffDays+1)/7));}
function getDaysUntilNewPlan(){if(!STATE.planGeneratedAt)return 0;const gen=new Date(STATE.planGeneratedAt);const now=new Date();const diffDays=Math.floor((now-gen)/(1000*60*60*24));return Math.max(0,7-diffDays);}

function buildWeightChart(logs){const withWeight=logs.filter(l=>l.weight&&parseFloat(l.weight)>0).slice(0,30).reverse();if(withWeight.length<2)return'<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Registra tu peso diariamente para ver el gráfico 📊</div>';const weights=withWeight.map(l=>parseFloat(l.weight));const dates=withWeight.map(l=>l.date?.slice(0,5)||'');const mn=Math.min(...weights)-0.5,mx=Math.max(...weights)+0.5;const W=300,H=120,pad=30;const xScale=i=>pad+(i/(withWeight.length-1))*(W-pad*2);const yScale=v=>H-pad-((v-mn)/(mx-mn))*(H-pad*2);const points=weights.map((w,i)=>`${xScale(i)},${yScale(w)}`).join(' ');const area=`${xScale(0)},${H-10} `+weights.map((w,i)=>`${xScale(i)},${yScale(w)}`).join(' ')+` ${xScale(weights.length-1)},${H-10}`;return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto"><defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/></linearGradient></defs><polygon points="${area}" fill="url(#wg)"/><polyline points="${points}" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${weights.map((w,i)=>`<circle cx="${xScale(i)}" cy="${yScale(w)}" r="3.5" fill="#a78bfa"/><text x="${xScale(i)}" y="${yScale(w)-8}" text-anchor="middle" font-size="9" fill="#a78bfa">${w}</text>`).join('')}</svg>`;}

function renderProgress(){
  const prog=calcProgress();const div=document.createElement('div');
  div.innerHTML=`<div class="stats-grid stats-grid2">${[{l:'Días registrados',v:prog.days,i:'🗓️',c:'var(--blue)'},{l:prog.retroceso?'Kg ganados':'Kg perdidos',v:prog.retroceso?`+${Math.abs(prog.lost)}kg`:Math.max(0,prog.lost)+'kg',i:prog.retroceso?'📈':'🔥',c:prog.retroceso?'#f87171':'var(--amber)'},{l:prog.retroceso?'Retroceso':'Progreso meta',v:prog.pct+'%',i:prog.retroceso?'📉':'🎯',c:prog.retroceso?'#f87171':'var(--purple)'},{l:'Peso actual',v:prog.lw+'kg',i:'⚖️',c:'var(--green)'}].map(s=>`<div class="stat-box" style="background:${s.c}12;border:1px solid ${s.c}25"><div class="stat-icon">${s.i}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('')}</div>
    <div class="card" style="background:linear-gradient(135deg,${prog.retroceso?'#f8717112':'#a78bfa12'},var(--surface));border:1px solid ${prog.retroceso?'#f8717128':'#a78bfa28'}">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:700">${prog.retroceso?'⚠️ Retroceso':'Progreso hacia la meta'}</span><span style="color:${prog.retroceso?'#f87171':'var(--purple)'};font-weight:800">${prog.pct}%</span></div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${Math.max(0,Math.min(100,Math.abs(parseInt(prog.pct))))}%;background:linear-gradient(90deg,${prog.retroceso?'#f87171':'var(--purple)'},${prog.retroceso?'#f8717180':'#7c3aed80'})"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px"><span style="font-size:11px;color:var(--muted)">Inicio: ${STATE.profile.weight}kg</span><span style="font-size:11px;color:var(--muted)">Meta: ${STATE.profile.targetWeight}kg</span></div>
    </div>
    <div class="card"><div class="card-h">📉 Evolución de Peso</div>${buildWeightChart(STATE.dailyLogs)}</div>
    <div class="card"><div class="card-h">📋 Historial reciente</div>
      ${!STATE.dailyLogs.length?'<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Sin registros aún 💪</div>':STATE.dailyLogs.slice(0,10).map(l=>`<div class="log-item"><div class="log-row"><span class="log-date">${l.date}</span><span class="badge" style="background:${l.training==='si'?'#34d39920':'#1e1e3a'};color:${l.training==='si'?'var(--green)':'var(--muted)'}">${l.training==='si'?'💪 Entrenó':l.training==='activo'?'🚶 Activo':'😴 Descanso'}</span></div><div class="tags">${l.weight?`<span class="tag">⚖️ ${l.weight}kg</span>`:''} ${l.calories?`<span class="tag">🔥 ${l.calories}kcal</span>`:''} ${l.protein?`<span class="tag">🥩 ${l.protein}g</span>`:''} ${l.sleep?`<span class="tag">😴 ${l.sleep}h</span>`:''} ${l.energy?`<span class="tag">⚡ ${l.energy}/5</span>`:''}</div></div>`).join('')}
    </div>
    <button class="btn btn-blue" id="btn-weekly">${STATE.aiLoading?'⏳ Analizando…':'🧠 Análisis semanal con IA'}</button>
    ${STATE.aiMsg?`<div class="card card-blue" style="margin-top:12px"><div class="card-sh">📊 Informe de progreso</div><div class="ai-text">${STATE.aiMsg}</div></div>`:''}`;
  div.querySelector('#btn-weekly').onclick=async()=>{STATE.aiLoading=true;render();const p=STATE.profile;const prog2=calcProgress();const alertaRetroceso=prog2.retroceso?`⚠️ ALERTA CRÍTICA: subió ${Math.abs(prog2.lost)}kg desde inicio (${prog2.pesoInicial}kg→${prog2.lw}kg). Sé directo, propón plan de corrección con pasos claros.`:'';const r=await claude([{role:'user',content:`Análisis de progreso de ${p.name} (300 palabras):\n${alertaRetroceso}\nPerfil: ${JSON.stringify(p)}\nRegistros últimos 7 días: ${JSON.stringify(STATE.dailyLogs.slice(0,7))}\nProgreso: ${prog2.lost}kg en ${prog2.days} días.`}]);STATE.aiMsg=r;STATE.aiLoading=false;render();};
  return div;
}

if ('serviceWorker' in navigator) {
  const sw=`const C='fitai-v2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>{if(e.request.url.includes('api.anthropic.com')||e.request.url.includes('sdk.mercadopago.com'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ── Arranque: carga precio configurable antes del primer render ──
(async function boot() {
  await initConfig();
  render();
})();
</script>
</body>
</html>
