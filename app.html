<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#04040f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="FitAI Pro"/>
<title>FitAI Pro</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://sdk.mercadopago.com/js/v2"></script>
<style>
/* ─── DESIGN SYSTEM ─── */
:root{
  --bg:#04040f;--bg2:#07071a;
  --surface:rgba(11,11,28,.93);--surface2:rgba(16,16,38,.88);
  --border:rgba(255,255,255,.065);--border2:rgba(255,255,255,.11);
  --text:#f2f2ff;--muted:#69699a;
  --purple:#9d71ff;--blue:#4db8ff;--green:#2eef9a;
  --amber:#ffcc44;--lime:#b8ff57;--red:#ff5577;--pink:#f472b6;--cyan:#22d3ee;
  --gp:rgba(157,113,255,.28);--gb:rgba(77,184,255,.2);
  --gg:rgba(46,239,154,.22);--gl:rgba(184,255,87,.22);--ga:rgba(255,204,68,.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
/* Ambient mesh */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 110% 55% at 50% -8%,rgba(90,40,220,.18) 0%,transparent 65%),
  radial-gradient(ellipse 65% 45% at 96% 88%,rgba(40,130,255,.1) 0%,transparent 58%),
  radial-gradient(ellipse 50% 40% at 4% 55%,rgba(46,239,154,.055) 0%,transparent 55%);}
#app{min-height:100vh;padding-bottom:80px;position:relative;z-index:1;}
h1,h2,h3{font-family:'Syne',sans-serif;letter-spacing:-.3px;}
input,select,textarea{font-family:'DM Sans',sans-serif;color-scheme:dark;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}

/* ─── SCREEN ─── */
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;background:transparent;position:relative;overflow:hidden;}
.screen::before{content:'';position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(110,50,240,.14),transparent 70%);top:-160px;left:50%;transform:translateX(-50%);pointer-events:none;}
.screen-logo{font-size:60px;margin-bottom:16px;animation:floatLogo 3.5s ease-in-out infinite;display:block;text-align:center;}
.screen-title{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;background:linear-gradient(135deg,var(--lime) 0%,var(--blue) 52%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;letter-spacing:-.5px;}
.screen-sub{font-size:14px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.75;}

/* ─── AUTH CARD ─── */
.auth-card{background:rgba(9,9,24,.92);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:28px 24px;width:100%;max-width:400px;margin-top:28px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.03);animation:slideUp .5s cubic-bezier(.16,1,.3,1) both;}
.auth-tabs{display:flex;background:rgba(255,255,255,.04);border-radius:14px;padding:4px;margin-bottom:24px;gap:4px;}
.auth-tab{flex:1;padding:10px;border:none;border-radius:10px;background:none;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;}
.auth-tab.active{background:rgba(157,113,255,.12);color:var(--purple);border:1px solid rgba(157,113,255,.22);box-shadow:0 2px 16px rgba(157,113,255,.12);}

/* ─── FIELDS ─── */
.field{margin-bottom:16px;}
.field label{font-size:11px;color:var(--muted);margin-bottom:7px;display:block;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
input[type=text],input[type=email],input[type=password],input[type=number],input[type=tel],select,textarea{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:13px;padding:13px 16px;color:var(--text);font-size:15px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:rgba(157,113,255,.45);box-shadow:0 0 0 3px rgba(157,113,255,.1);background:rgba(157,113,255,.04);}
textarea{resize:none;height:80px;}

/* ─── BUTTONS ─── */
.btn{border:none;border-radius:14px;padding:15px 22px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;font-family:'Syne',sans-serif;letter-spacing:.3px;transition:transform .12s,opacity .2s,box-shadow .2s;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 55%);pointer-events:none;border-radius:inherit;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-lime{background:linear-gradient(135deg,#cbff70,var(--lime) 60%);color:#000;box-shadow:0 8px 28px var(--gl);}
.btn-purple{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;box-shadow:0 8px 28px var(--gp);}
.btn-green{background:linear-gradient(135deg,var(--green),#059669);color:#fff;box-shadow:0 8px 28px var(--gg);}
.btn-amber{background:linear-gradient(135deg,var(--amber),#d97706);color:#000;box-shadow:0 8px 28px var(--ga);}
.btn-blue{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;box-shadow:0 8px 28px var(--gb);}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.09);}
.btn-sm{padding:10px 18px;font-size:12px;width:auto;margin-top:0;}
.err{background:rgba(255,85,119,.08);border:1px solid rgba(255,85,119,.2);border-radius:13px;padding:12px 16px;font-size:13px;color:#ff7090;margin-bottom:14px;display:none;}
.err.show{display:block;}
.link-btn{background:none;border:none;color:var(--purple);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;padding:0;}

/* ─── PAYWALL ─── */
.paywall-card{background:rgba(9,9,24,.93);border:1.5px solid rgba(184,255,87,.2);border-radius:28px;padding:40px 28px;width:100%;max-width:420px;margin-top:24px;text-align:center;position:relative;overflow:hidden;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 0 80px rgba(184,255,87,.07),0 40px 100px rgba(0,0,0,.55);animation:slideUp .6s cubic-bezier(.16,1,.3,1) both .1s;}
.paywall-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(184,255,87,.45),transparent);}
.paywall-price{font-family:'Syne',sans-serif;font-size:72px;font-weight:900;color:var(--lime);line-height:1;margin:18px 0 4px;text-shadow:0 0 50px rgba(184,255,87,.42);}
.paywall-period{font-size:13px;color:var(--muted);margin-bottom:28px;}
.paywall-features{text-align:left;margin-bottom:28px;}
.paywall-feat{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;font-size:13px;color:var(--muted);}
.paywall-feat::before{content:'✓';color:#000;font-weight:800;flex-shrink:0;background:var(--lime);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px;}
.secure-badge{font-size:11px;color:var(--muted);margin-top:14px;display:flex;align-items:center;justify-content:center;gap:6px;}

/* ─── HEADER ─── */
.header{background:rgba(4,4,15,.88);padding:16px 16px 13px;border-bottom:1px solid rgba(255,255,255,.055);position:sticky;top:0;z-index:40;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(157,113,255,.22),transparent);}
.header-inner{display:flex;justify-content:space-between;align-items:center;max-width:600px;margin:0 auto;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--lime),var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{font-size:11px;color:var(--muted);margin-top:1px;font-weight:500;}
.badge{border-radius:999px;padding:3px 12px;font-size:11px;font-weight:700;display:inline-block;}
.content{padding:16px;max-width:600px;margin:0 auto;}

/* ─── TAB BAR ─── */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(3,3,14,.94);border-top:1px solid rgba(255,255,255,.055);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.tabbar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(157,113,255,.28),transparent);}
.tab-btn{flex:1;padding:10px 4px 8px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;font-family:'DM Sans',sans-serif;position:relative;}
.tab-btn.active{color:var(--purple);}
.tab-btn .icon{font-size:21px;line-height:1;transition:transform .2s,filter .2s;}
.tab-btn.active .icon{transform:scale(1.12);filter:drop-shadow(0 0 7px rgba(157,113,255,.65));}
.tab-active-dot{position:absolute;top:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--purple);box-shadow:0 0 10px rgba(157,113,255,.9);animation:dotAppear .25s ease;}

/* ─── SIDE MENU ─── */
.side-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.side-overlay.open{opacity:1;pointer-events:all;}
.side-menu{position:fixed;left:0;top:0;bottom:0;width:285px;background:rgba(5,5,18,.97);border-right:1px solid rgba(255,255,255,.07);z-index:301;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;backdrop-filter:blur(24px);}
.side-menu.open{transform:translateX(0);}
.side-header{padding:28px 20px 22px;border-bottom:1px solid rgba(255,255,255,.06);background:linear-gradient(135deg,rgba(80,20,220,.13),transparent);}
.side-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.side-user{font-size:12px;color:var(--muted);margin-top:5px;}
.side-item{display:flex;align-items:center;gap:14px;padding:15px 20px;color:var(--text);font-size:14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s,color .15s;font-weight:500;}
.side-item:hover{background:rgba(157,113,255,.08);color:var(--purple);}
.side-item-icon{font-size:20px;width:28px;text-align:center;}
.side-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(105,105,154,.7);padding:14px 20px 4px;font-weight:700;}

/* ─── CARDS ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.card-purple{background:linear-gradient(135deg,rgba(157,113,255,.1),rgba(9,9,24,.95));border-color:rgba(157,113,255,.2);box-shadow:0 0 50px rgba(157,113,255,.05);}
.card-green{background:linear-gradient(135deg,rgba(46,239,154,.08),rgba(9,9,24,.95));border-color:rgba(46,239,154,.18);}
.card-amber{background:linear-gradient(135deg,rgba(255,204,68,.08),rgba(9,9,24,.95));border-color:rgba(255,204,68,.18);}
.card-blue{background:linear-gradient(135deg,rgba(77,184,255,.08),rgba(9,9,24,.95));border-color:rgba(77,184,255,.18);}
.card-h{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-.2px;}
.card-sh{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px;}

/* ─── STATS GRID ─── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stats-grid2{grid-template-columns:repeat(2,1fr);}
.stat-box{border-radius:18px;padding:15px 10px;text-align:center;position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05),transparent 60%);pointer-events:none;}
.stats-grid .stat-box:nth-child(1){animation:fadeUp .4s ease both 0s;}
.stats-grid .stat-box:nth-child(2){animation:fadeUp .4s ease both .08s;}
.stats-grid .stat-box:nth-child(3){animation:fadeUp .4s ease both .16s;}
.stats-grid2 .stat-box:nth-child(1){animation:fadeUp .4s ease both 0s;}
.stats-grid2 .stat-box:nth-child(2){animation:fadeUp .4s ease both .08s;}
.stats-grid2 .stat-box:nth-child(3){animation:fadeUp .4s ease both .16s;}
.stats-grid2 .stat-box:nth-child(4){animation:fadeUp .4s ease both .24s;}
.stat-icon{font-size:22px;margin-bottom:6px;display:block;}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;animation:countUp .5s cubic-bezier(.16,1,.3,1) both .15s;display:block;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;display:block;}

/* ─── PROGRESS ─── */
.prog-wrap{height:8px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin:8px 0;}
.prog-fill{height:100%;border-radius:999px;transition:width 1.4s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);background-size:200% 100%;animation:shimmer 2.4s infinite;}

/* ─── ENERGY ─── */
.energy-row{display:flex;gap:7px;}
.energy-btn{flex:1;padding:13px 0;border-radius:12px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--muted);font-weight:700;cursor:pointer;font-size:15px;transition:all .2s;}
.energy-btn.active{border-color:var(--amber);background:rgba(255,204,68,.12);color:var(--amber);box-shadow:0 0 20px rgba(255,204,68,.14);}

/* ─── AI TEXT ─── */
.ai-text{font-size:14px;color:#d8daee;line-height:1.9;white-space:pre-wrap;}

/* ─── EXERCISE CARDS ─── */
.ex-card{display:flex;align-items:stretch;background:rgba(11,11,28,.92);border-radius:14px;padding:0;margin:8px 0;border:1px solid rgba(255,255,255,.06);overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.2);cursor:pointer;transition:transform .15s,border-color .2s,box-shadow .2s;}
.ex-card:active{transform:scale(.975);}
.ex-card:hover{border-color:rgba(255,255,255,.11);box-shadow:0 6px 28px rgba(0,0,0,.35);}
.ex-card-accent{width:4px;flex-shrink:0;}
.ex-card-info{flex:1;padding:13px 14px;}
.ex-card-name{font-size:14px;font-weight:700;color:#f0f3ff;line-height:1.35;margin-bottom:3px;}
.ex-card-detail{font-size:12px;color:#4d5570;line-height:1.45;margin-bottom:7px;}
.ex-card-badge{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:999px;}
.ex-card-tap{display:flex;align-items:center;justify-content:center;width:36px;flex-shrink:0;color:#3a3a58;font-size:16px;border-left:1px solid rgba(255,255,255,.04);}

/* ─── EX MODAL ─── */
.ex-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s ease;-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);}
.ex-modal-overlay.open{opacity:1;pointer-events:all;}
.ex-modal{background:rgba(7,7,22,.98);border:1px solid rgba(255,255,255,.1);border-radius:24px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;position:relative;transform:translateY(22px) scale(.94);transition:transform .28s cubic-bezier(.16,1,.3,1);}
.ex-modal-overlay.open .ex-modal{transform:translateY(0) scale(1);}
.ex-modal-close{position:sticky;top:0;z-index:2;display:flex;justify-content:flex-end;padding:14px 16px 0;}
.ex-modal-close button{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ex-modal-header{padding:8px 20px 16px;text-align:center;}
.ex-modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px;}
.ex-modal-muscle{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.ex-modal-images{display:flex;gap:10px;padding:0 16px 16px;}
.ex-modal-label{text-align:center;font-size:10px;color:var(--muted);font-weight:600;margin-top:8px;text-transform:uppercase;letter-spacing:.5px;}

/* ─── PLAN ─── */
.plan-section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--purple);margin:20px 0 10px;padding:8px 0;border-bottom:1px solid rgba(157,113,255,.1);}
.plan-section-title.nut{color:var(--green);border-bottom-color:rgba(46,239,154,.1);}
.plan-text-line{font-size:13.5px;color:#8890b0;line-height:1.75;margin:4px 0;}
.day-block{border-radius:20px;overflow:hidden;margin-bottom:16px;border:1px solid transparent;animation:fadeUp .45s ease both;}
.day-header{display:flex;align-items:center;gap:12px;padding:14px 18px;}
.day-pill{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;border-radius:999px;padding:4px 13px;}
.day-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;flex:1;}
.day-exercises{padding:0 12px 14px;display:flex;flex-direction:column;gap:6px;}

/* ─── MEAL CARDS ─── */
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;margin-bottom:14px;overflow:hidden;backdrop-filter:blur(12px);}
.meal-card-header{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;transition:background .15s;}
.meal-card-header:active{background:rgba(255,255,255,.02);}
.meal-card-icon{font-size:26px;width:38px;text-align:center;}
.meal-card-title{flex:1;}
.meal-card-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.3;}
.meal-card-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.meal-card-arrow{color:var(--muted);font-size:16px;padding:0 4px;}
.meal-card-items{padding:0 18px 16px;border-top:1px solid rgba(255,255,255,.05);}
.meal-card-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13.5px;color:#c0c4dc;border-bottom:1px solid rgba(255,255,255,.04);}
.meal-card-item:last-child{border-bottom:none;}
.meal-card-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* ─── LOG ─── */
.log-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.log-item:last-child{border-bottom:none;}
.log-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.log-date{font-size:14px;font-weight:700;}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);border-radius:8px;padding:3px 10px;font-weight:500;}

/* ─── MINI CHART BARS ─── */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:52px;padding:0 2px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bar{width:100%;background:linear-gradient(180deg,var(--blue),rgba(77,184,255,.28));border-radius:4px 4px 0 0;transform-origin:bottom;animation:barGrow .55s cubic-bezier(.34,1.56,.64,1) both;}
.bar-lbl{font-size:8px;color:rgba(255,255,255,.25);}

/* ─── CHAT ─── */
.chat-msg{padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.8;margin-bottom:8px;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:break-word;}
.chat-user{background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.07);}
.chat-ai{background:rgba(157,113,255,.08);color:#c4b5fd;border:1px solid rgba(157,113,255,.14);}

function getGoalType(){const g=(STATE.profile?.goal||'').toLowerCase();if(g.includes('aumento')||g.includes('ganar masa'))return'gain';if(g.includes('recomp'))return'recomp';return'loss';}
function getActiveLogs(){if(!STATE.programStartDate)return STATE.dailyLogs;const ts=new Date(STATE.programStartDate).setHours(0,0,0,0);return STATE.dailyLogs.filter(l=>{if(!l.date)return false;let d;if(l.date.includes('/')){const[dy,mo,yr]=l.date.split('/');d=new Date(+yr,+mo-1,+dy);}else{d=new Date(l.date);}return d.getTime()>=ts;});}
function getDaysActive(){if(STATE.programStartDate){const s=new Date(STATE.programStartDate);s.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);const d=Math.floor((t-s)/(864e5))+1;return Math.max(1,Math.min(d,(parseInt(STATE.profile?.weeksGoal)||16)*7+14));}if(STATE.dailyLogs.length>0){const GAP=14;const ld=STATE.dailyLogs.map(l=>{if(!l.date)return null;let d;if(l.date.includes('/')){const p=l.date.split('/');d=new Date(+p[2],+p[1]-1,+p[0]);}else if(l.date.includes('-')){const p=l.date.split('-');d=+p[0]>31?new Date(+p[0],+p[1]-1,+p[2]):new Date(+p[2],+p[1]-1,+p[0]);}else{d=new Date(l.date);}if(!d||isNaN(d.getTime())||d.getFullYear()<2025)return null;return d;}).filter(d=>d!==null).sort((a,b)=>a-b);if(ld.length>0){let ps=ld[0];for(let i=ld.length-1;i>0;i--){const g=(ld[i]-ld[i-1])/864e5;if(!isNaN(g)&&g>GAP){ps=ld[i];break;}}ps.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);const d=Math.floor((t-ps)/864e5)+1;return Math.max(1,Math.min(d,(parseInt(STATE.profile?.weeksGoal)||16)*7+14));}}if(STATE.planGeneratedAt){const s=new Date(STATE.planGeneratedAt);s.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return Math.floor((t-s)/864e5)+1;}return STATE.dailyLogs.length;}
function calcProgress(){const logs=getActiveLogs();const gtype=getGoalType();const sw=parseFloat(STATE.profile?.weight)||0;const tw=parseFloat(STATE.profile?.targetWeight)||sw;const lw=logs.length?(parseFloat(logs[0]?.weight)||sw):sw;const pi=sw;let lost,pct,retroceso,kgLabel,kgIcon,kgColor;if(gtype==='gain'){lost=lw-pi;const total=Math.max(.1,tw-pi);retroceso=logs.length>0&&lost<0;pct=retroceso?Math.min(100,(Math.abs(lost)/total)*100):Math.min(100,Math.max(0,(lost/total)*100));kgLabel=retroceso?'Kg perdidos':'Kg ganados';kgIcon=retroceso?'📉':'📈';kgColor=retroceso?'#f87171':'var(--green)';}else if(gtype==='recomp'){lost=pi-lw;const tw2=Math.max(1,parseInt(STATE.profile?.weeksGoal||12));pct=Math.min(100,(logs.length/(tw2*7))*100);retroceso=false;kgLabel='Kg ajustados';kgIcon='🔄';kgColor='var(--blue)';}else{lost=pi-lw;const total=Math.max(.1,pi-tw);retroceso=logs.length>0&&lost<0;pct=retroceso?Math.min(100,(Math.abs(lost)/total)*100):Math.min(100,(lost/total)*100);kgLabel=retroceso?'Kg ganados':'Kg perdidos';kgIcon=retroceso?'📈':'🔥';kgColor=retroceso?'#f87171':'var(--amber)';}const trend=logs.slice(0,14).reverse().map(l=>({date:l.date,w:parseFloat(l.weight)||null})).filter(l=>l.w);return{lost:lost.toFixed(1),pct:Math.max(0,pct).toFixed(0),days:getDaysActive(),trend,lw:lw||sw,retroceso,pesoInicial:pi,kgLabel,kgIcon,kgColor,gtype};}

// ── Extract calorie & macro goals — always from live plan text ──
function parseNutNum(str,minVal=0){
  if(!str)return null;
  const clean=str.replace(/[.\s]/g,'').replace(/,/g,'');
  const n=parseInt(clean);
  return(!isNaN(n)&&n>minVal)?n:null;
}
function parseNutritionGoals(){
  const nut=STATE.nutrition||'';

  // Step 1: try inline format on a single line
  // e.g. "Calorías: 2.100 kcal | Proteína: 175g | Carbohidratos: 210g | Grasas: 58g"
  const inlineM=nut.match(/[Cc]alorías[^\n]*?([\d.,]+)\s*kcal[^\n]*[Pp]roteína[^\n]*?([\d.,]+)\s*g[^\n]*[Cc]arbohidratos?[^\n]*?([\d.,]+)\s*g[^\n]*[Gg]rasas?[^\n]*?([\d.,]+)\s*g/);
  if(inlineM){
    const c=parseNutNum(inlineM[1],800),p=parseNutNum(inlineM[2],10),cr=parseNutNum(inlineM[3],10),f=parseNutNum(inlineM[4],5);
    if(c&&p&&cr&&f) return{calGoal:c,protGoal:p,carbsGoal:cr,fatsGoal:f,fromPlan:true};
  }

  // Step 2: line-by-line — skip context/descriptive lines
  const skipLine=(l)=>/déficit|estimado|TDEE|sobre|semana|dieta|moderado|objetivo\s*general|promedio/i.test(l);
  const lines=nut.split('\n');
  let calRaw=null,protRaw=null,carbRaw=null,fatRaw=null;

  for(const line of lines){
    if(skipLine(line)) continue;
    const l=line.replace(/^[-•*\s#🔥📊🥗]+/,'');

    if(!calRaw){
      // Must be a number > 800 to be a daily calorie goal
      const m=l.match(/[Cc]alorías?(?:\s*(?:objetivo|totales|diarias?|meta))?\s*[:\-]\s*~?\s*([\d.,]+)/);
      if(m){const v=parseNutNum(m[1],800);if(v)calRaw=v;}
    }
    if(!protRaw){
      const m=l.match(/[Pp]roteína\s*[:\-]\s*~?\s*([\d.,]+)\s*g/);
      if(m){const v=parseNutNum(m[1],10);if(v)protRaw=v;}
    }
    if(!carbRaw){
      const m=l.match(/[Cc]arbohidratos?\s*[:\-]\s*~?\s*([\d.,]+)\s*g/);
      if(m){const v=parseNutNum(m[1],10);if(v)carbRaw=v;}
    }
    if(!fatRaw){
      const m=l.match(/[Gg]rasas?\s*[:\-]\s*~?\s*([\d.,]+)\s*g/);
      if(m){const v=parseNutNum(m[1],5);if(v)fatRaw=v;}
    }
  }

  const fromPlan=!!(calRaw&&calRaw>800);

  // TDEE fallback (only when plan has no parseable macros yet)
  const _p=STATE.profile||{};
  const _w=parseFloat(_p.weight)||75,_h=parseFloat(_p.height)||170,_a=parseInt(_p.age)||30;
  const _male=(_p.gender||'').toLowerCase().includes('masc');
  const _bmr=_male?(10*_w+6.25*_h-5*_a+5):(10*_w+6.25*_h-5*_a-161);
  const _mult={sedentario:1.2,ligero:1.375,moderado:1.55,activo:1.725,atleta:1.9};
  const _mk=Object.keys(_mult).find(k=>(_p.activityLevel||'').toLowerCase().includes(k))||'moderado';
  const _tdee=Math.round(_bmr*_mult[_mk]);
  const _gl=(_p.goal||'').toLowerCase();
  const _fb=_gl.includes('bajar')||_gl.includes('grasa')?Math.max(_tdee-500,1200):_gl.includes('aumento')||_gl.includes('masa')?_tdee+300:_tdee;

  const calGoal=calRaw||_fb;
  const protGoal=protRaw||Math.round(_w*2);
  const fatsGoal=fatRaw||Math.round(calGoal*.25/9);
  const carbsGoal=carbRaw||Math.max(0,Math.round((calGoal-protGoal*4-fatsGoal*9)/4));

  return{calGoal,protGoal,carbsGoal,fatsGoal,fromPlan};
}
function buildRingChart(pct,_c,size,stroke,label,sublabel){
  var p=Math.min(100,Math.max(0,pct||0));
  var tk=16,r=size/2-tk/2-2,circ=2*Math.PI*r,off=circ*(1-p/100);
  var col=p>=100?'#2eef9a':p>=75?'#b8ff57':p>=50?'#ffcc44':p>=25?'#fb923c':'#f87171';
  var glow=p>=100?'rgba(46,239,154,.7)':p>=75?'rgba(184,255,87,.65)':p>=50?'rgba(255,204,68,.6)':p>=25?'rgba(251,146,60,.55)':'rgba(248,113,113,.5)';

  h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="'+tk+'" stroke-linecap="round"/>';
  if(p>0){
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+(tk+6)+'" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" transform="rotate(-90 '+cx+' '+cy+')" opacity=".18"/>';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="'+tk+'" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" transform="rotate(-90 '+cx+' '+cy+')" class="ring-animate" style="--full:'+circ+';--offset:'+off+';filter:drop-shadow(0 0 8px '+glow+')"/>';
  }
  h+='</svg><div class="cal-ring-center">';
  h+='<div style="font-family:Syne,sans-serif;font-size:'+fs+';font-weight:900;color:'+fc+';line-height:1;animation:countUp .6s ease both .4s">'+label+'</div>';

  if(p>0)h+='<div style="font-size:'+fsp+';color:'+col+';font-weight:800;margin-top:5px;background:'+col+'18;padding:2px 8px;border-radius:999px">'+Math.round(p)+'%</div>';
  h+='</div></div>';
  return h;
}
function buildMacroBar(label,val,max,_color){
  var pct=max>0?Math.min(100,Math.round((val/max)*100)):0;
  var col=pct>=100?'#2eef9a':pct>=75?'#b8ff57':pct>=50?'#ffcc44':pct>=25?'#fb923c':'#f87171';
  var h='<div class="macro-bar-wrap">';
  h+='<div class="macro-bar-label">';
  h+='<span style="color:'+col+';font-weight:700">'+label+'</span>';
  h+='<span style="color:'+(pct>=100?col:'var(--muted)')+';font-weight:'+(pct>=100?'700':'500')+'">'+val+'g <span style="font-size:10px;opacity:.7">/'+max+'g</span></span>';
  h+='</div>';

function getStreak(){
  const logs=STATE.dailyLogs;if(!logs.length)return 0;
  const sorted=[...logs].sort((a,b)=>parseDateLog(b.date)-parseDateLog(a.date));
  let streak=0;let prev=new Date();prev.setHours(0,0,0,0);
  for(const l of sorted){const d=parseDateLog(l.date);d.setHours(0,0,0,0);const diff=(prev-d)/864e5;if(diff<=1.5){streak++;prev=d;}else break;}
  return streak;
}

// ── Real-time meal analysis ───────────────────────────────────────
const MEAL_LABELS={desayuno:'Desayuno',colacion_am:'Colación AM',almuerzo:'Almuerzo',merienda:'Merienda PM',cena:'Cena'};
function recalcTotals(){
  const macros=STATE.todayLog.mealMacros||{};
  const meals=Object.values(macros).filter(m=>m&&m.cal>=0);
  if(!meals.length)return;
  STATE.todayLog.calories=String(meals.reduce((s,m)=>s+(m.cal||0),0));
  STATE.todayLog.protein=String(meals.reduce((s,m)=>s+(m.prot||0),0));
  STATE.todayLog.carbs=String(meals.reduce((s,m)=>s+(m.carbs||0),0));
  STATE.todayLog.fats=String(meals.reduce((s,m)=>s+(m.fats||0),0));
}
async function analyzeSingleMeal(mealKey,dataUrl){
  if(!STATE.todayLog.mealAnalyzing)STATE.todayLog.mealAnalyzing={};
  STATE.todayLog.mealAnalyzing[mealKey]=true;
  render();
  try{
    const b64=dataUrl.split(',')[1];const mt=dataUrl.split(';')[0].split(':')[1];
    const label=MEAL_LABELS[mealKey]||mealKey;
    const result=await claudeVision([
      {type:'image',source:{type:'base64',media_type:mt,data:b64}},
      {type:'text',text:`Analiza esta foto de ${label}. Responde SOLO con este formato exacto (sin texto adicional):
Calorías: XXX
Proteína: XXg
Carbohidratos: XXg
Grasas: XXg
Descripción: (10 palabras máx)`}
    ],300);
    const cM=result.match(/[Cc]alorías:\s*~?\s*(\d+)/);
    const pM=result.match(/[Pp]roteína:\s*~?\s*(\d+)/);
    const crM=result.match(/[Cc]arbohidratos:\s*~?\s*(\d+)/);
    const fM=result.match(/[Gg]rasas:\s*~?\s*(\d+)/);
    const dM=result.match(/[Dd]escripción:\s*(.+)/);
    if(!STATE.todayLog.mealMacros)STATE.todayLog.mealMacros={};
    STATE.todayLog.mealMacros[mealKey]={
      cal:cM?parseInt(cM[1]):0,
      prot:pM?parseInt(pM[1]):0,
      carbs:crM?parseInt(crM[1]):0,
      fats:fM?parseInt(fM[1]):0,
      desc:dM?dM[1].trim():'',
      ok:!!(cM&&pM)
    };
    recalcTotals();
  }catch(e){
    if(!STATE.todayLog.mealMacros)STATE.todayLog.mealMacros={};
    STATE.todayLog.mealMacros[mealKey]={cal:0,prot:0,carbs:0,fats:0,desc:'Error',ok:false};
  }
  delete STATE.todayLog.mealAnalyzing[mealKey];
  recalcTotals();
  save();
  render();
}

function parseDateLog(d){if(!d)return new Date(0);if(d.includes('/')){const[dy,mo,yr]=d.split('/');return new Date(+yr,+mo-1,+dy);}if(d.includes('-')){const p=d.split('-');return +p[0]>31?new Date(+p[0],+p[1]-1,+p[2]):new Date(+p[2],+p[1]-1,+p[0]);}return new Date(d);}
function sortedLogs(logs){return[...logs].sort((a,b)=>parseDateLog(b.date)-parseDateLog(a.date));}
function buildWeightChart(logs){

  const ws=cd.map(l=>parseFloat(l.weight));const mn=Math.min(...ws)-.8,mx=Math.max(...ws)+.8;

function renderProgress(){
  const prog=calcProgress();const div=document.createElement('div');const al=getActiveLogs();
  const kgV=prog.gtype==='gain'?(parseFloat(prog.lost)>=0?'+':'')+prog.lost+'kg':(prog.retroceso?'+'+Math.abs(prog.lost):''+Math.max(0,prog.lost))+'kg';
  div.innerHTML=`<div class="stats-grid stats-grid2">${[{l:'Días registrados',v:prog.days,i:'🗓️',c:'var(--blue)'},{l:prog.kgLabel,v:kgV,i:prog.kgIcon,c:prog.kgColor},{l:prog.retroceso?'Retroceso':'Progreso meta',v:prog.pct+'%',i:prog.retroceso?'📉':'🎯',c:prog.retroceso?'#f87171':'var(--purple)'},{l:'Peso actual',v:prog.lw+'kg',i:'⚖️',c:'var(--green)'}].map(s=>`<div class="stat-box" style="background:${s.c}12;border:1px solid ${s.c}25"><div class="stat-icon">${s.i}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('')}</div>
  <div class="card" style="background:linear-gradient(135deg,${prog.retroceso?'#f8717112':'#a78bfa12'},var(--surface));border:1px solid ${prog.retroceso?'#f8717128':'#a78bfa28'}">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:700">${prog.retroceso?'⚠️ Retroceso':'Progreso hacia la meta'}</span><span style="color:${prog.retroceso?'#f87171':'var(--purple)'};font-weight:800">${prog.pct}%</span></div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${Math.max(0,Math.min(100,Math.abs(parseInt(prog.pct))))}%;background:linear-gradient(90deg,${prog.retroceso?'#f87171':'var(--purple)'},${prog.retroceso?'#f8717180':'#7c3aed80'})"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px"><span style="font-size:11px;color:var(--muted)">Inicio: ${STATE.profile.weight}kg</span><span style="font-size:11px;color:var(--muted)">Meta: ${STATE.profile.targetWeight}kg</span></div>
  </div>
  <div class="card"><div class="card-h">📉 Evolución de Peso</div>${buildWeightChart(al)}</div>
  ${(()=>{const {calGoal,protGoal,carbsGoal,fatsGoal}=parseNutritionGoals();const recent=al.filter(l=>l.calories).slice(0,7);if(!recent.length)return'';
    // Average only days that have actual data for each macro (avoid false zeros)
    const avg=(logs,key)=>{const valid=logs.filter(l=>parseInt(l[key])>0);return valid.length?Math.round(valid.reduce((s,l)=>s+(parseInt(l[key])||0),0)/valid.length):0;};
    const avgCal=avg(recent,'calories');const avgProt=avg(recent,'protein');const avgCarbs=avg(recent,'carbs');const avgFats=avg(recent,'fats');return`<div class="card"><div class="card-h">📊 Macros promedio (7 días)</div><div style="display:flex;gap:16px;align-items:center;justify-content:space-around"><div style="position:relative">${buildRingChart(Math.round((avgCal/calGoal)*100),'#f87171',110,16,avgCal+'','kcal/día')}</div><div style="flex:1">${buildMacroBar('Proteína',avgProt,protGoal,'#60a5fa')}${buildMacroBar('Carbos',avgCarbs,carbsGoal,'#fbbf24')}${buildMacroBar('Grasas',avgFats,fatsGoal,'#a78bfa')}</div></div></div>`;})()}
  <div class="card"><div class="card-h">📋 Historial reciente</div>${!al.length?'<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Sin registros aún 💪</div>':sortedLogs(al).slice(0,10).map(l=>`<div class="log-item"><div class="log-row"><span class="log-date">${l.date}</span><span class="badge" style="background:${l.training==='si'?'#34d39920':'#1e1e3a'};color:${l.training==='si'?'var(--green)':'var(--muted)'}">${l.training==='si'?'💪 Entrenó':l.training==='activo'?'🚶 Activo':'😴 Descanso'}</span></div><div class="tags">${l.weight?`<span class="tag">⚖️ ${l.weight}kg</span>`:''} ${l.calories?`<span class="tag">🔥 ${l.calories}kcal</span>`:''} ${l.protein?`<span class="tag">🥩 ${l.protein}g</span>`:''} ${l.carbs?`<span class="tag">🍚 ${l.carbs}g</span>`:''} ${l.fats?`<span class="tag">🥑 ${l.fats}g</span>`:''} ${l.sleep?`<span class="tag">😴 ${l.sleep}h</span>`:''} ${l.energy?`<span class="tag">⚡ ${l.energy}/5</span>`:''}</div></div>`).join('')}</div>
  <button class="btn btn-blue" id="btn-weekly">${STATE.aiLoading?'⏳ Analizando…':'🧠 Análisis semanal con IA'}</button>
  ${STATE.aiMsg?`<div class="card card-blue" style="margin-top:12px"><div class="card-sh">📊 Informe de progreso</div><div class="ai-text">${STATE.aiMsg}</div></div>`:''}`;
  div.querySelector('#btn-weekly').onclick=async()=>{STATE.aiLoading=true;render();const p=STATE.profile;const prog2=calcProgress();const r=await claude([{role:'user',content:`Análisis de progreso de ${p.name} (300 palabras):\n${prog2.retroceso?`⚠️ ALERTA: subió ${Math.abs(prog2.lost)}kg desde inicio.`:''}\nPerfil: ${JSON.stringify(p)}\nRegistros: ${JSON.stringify(al.slice(0,7))}\nProgreso: ${prog2.lost}kg en ${prog2.days} días.`}]);STATE.aiMsg=r;STATE.aiLoading=false;render();};
  return div;
}
// ── Boot ──────────────────────────────────────────────────────
(async function initApp(){
  if(STATE.user&&STATE.user.email){
    await loadProfileFromSupabase(STATE.user.email);
    if(STATE.screen==='setup'&&STATE.profile)STATE.screen=!STATE.user.paid?'paywall':'app';
    if(STATE.screen==='app'&&STATE.profile&&!profileIsComplete(STATE.profile))STATE.screen='setup';
    if(STATE.needsAIPlan&&STATE.profile&&!STATE.plan){
      STATE.needsAIPlan=false;STATE.aiLoading=true;save();render();
      const p=STATE.profile;const{desc,prefs}=getNutritionPrompt(p);
      const wt=(pr,ms)=>Promise.race([pr,new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms))]);
      try{STATE.plan=await wt(claude([{role:'user',content:`Plan entrenamiento semanal para ${desc}, lugar:${p.trainingPlace||'gimnasio'}. ${getTrainingPrompt(p.trainingPlace)}\nFORMATO:\n## DÍA 1 - LUNES: Grupo\n- Ejercicio (series x reps)\nMáx 250 palabras.`}]),25000);STATE.nutrition=await wt(claude([{role:'user',content:`Plan alimentación para ${desc}. ${prefs}\nFORMATO OBLIGATORIO:\n## 📊 Calorías y Macros\nCalorías: XXXX kcal | Proteína: XXXg | Carbohidratos: XXXg | Grasas: XXg\n## 🌅 Desayuno\n- alimento (cantidad)\n## ☀️ Almuerzo\n- alimento (cantidad)\n## 🌙 Cena\n- alimento (cantidad)\nMáx 250 palabras.`}]),25000);STATE.planGeneratedAt=new Date().toISOString();if(!STATE.programStartDate)STATE.programStartDate=STATE.planGeneratedAt;dbSavePlanNutrition(STATE.user?.email,STATE.plan,STATE.nutrition);}catch(e){STATE.plan='⚠️ Toca "🔄 Nueva semana" para generar.';STATE.nutrition='⚠️ Toca "🔄 Nuevo menú" para generar.';}
      STATE.aiLoading=false;
    }
    save();render();
  }
})();
if('serviceWorker' in navigator){const sw=`const C='fitai-v3';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>{if(e.request.url.includes('api.anthropic.com')||e.request.url.includes('sdk.mercadopago.com'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});}
(async function boot(){await initConfig();render();})();
</script>
</body>
