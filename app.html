<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<link rel="manifest" href="manifest.json"/>

<style>
:root {
  --bg: #080810; --surface: #10101c; --surface2: #16162a;
  --border: #1e1e38; --text: #eeeef8; --muted: #6b7280;
  --purple: #a78bfa; --blue: #60a5fa; --green: #34d399;
  --amber: #fbbf24; --lime: #b8ff57;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
h1,h2,h3 { font-family: 'Syne', sans-serif; }
input, select, textarea { font-family: 'DM Sans', sans-serif; color-scheme: dark; }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#app { min-height: 100vh; padding-bottom: 72px; }

/* --- AUTH / PAYWALL SCREENS --- */
.screen {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 30px 20px; background: var(--bg);
}
.screen-logo { font-size: 56px; margin-bottom: 12px; }
.screen-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--lime), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
.screen-sub { font-size: 13px; color: var(--muted); margin-top: 6px; text-align: center; line-height: 1.6; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 400px; margin-top: 24px; }
.auth-tabs { display: flex; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 9px; border: none; border-radius: 9px; background: none; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 6px #00000040; }
.field { margin-bottom: 14px; }
.field label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
input[type=text], input[type=email], input[type=password], input[type=number], select, textarea {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; color: var(--text); font-size: 14px; width: 100%; outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--purple); }
textarea { resize: none; height: 72px; }
.btn { border: none; border-radius: 12px; padding: 13px 20px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; font-family: 'Syne', sans-serif; transition: transform 0.1s, opacity 0.2s; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-lime { background: var(--lime); color: #000; }
.btn-purple { background: linear-gradient(135deg, var(--purple), #7c3aed); color: #fff; }
.btn-green  { background: linear-gradient(135deg, var(--green), #059669); color: #fff; }
.btn-amber  { background: linear-gradient(135deg, var(--amber), #d97706); color: #000; }
.btn-blue   { background: linear-gradient(135deg, var(--blue), #2563eb); color: #fff; }
.btn-ghost  { background: var(--surface2); color: var(--muted); }
.btn-sm     { padding: 9px 16px; font-size: 13px; width: auto; margin-top: 0; }
.err { background: #f8717115; border: 1px solid #f8717130; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #f87171; margin-bottom: 12px; display: none; }
.err.show { display: block; }
.link-btn { background: none; border: none; color: var(--purple); cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; text-decoration: underline; padding: 0; }

/* --- PAYWALL --- */
.paywall-card { background: var(--surface); border: 2px solid var(--lime); border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 420px; margin-top: 20px; text-align: center; position: relative; overflow: hidden; }
.paywall-card::before { content: ''; position: absolute; top: -60px; left: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #b8ff5712, transparent 70%); }
.paywall-price { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 900; color: var(--lime); line-height: 1; margin: 16px 0 4px; }
.paywall-period { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.paywall-features { text-align: left; margin-bottom: 28px; }
.paywall-feat { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 13px; color: var(--muted); }
.paywall-feat::before { content: '✓'; color: var(--lime); font-weight: 800; flex-shrink: 0; }
.stripe-element { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.stripe-element.StripeElement--focus { border-color: var(--purple); }
.secure-badge { font-size: 11px; color: var(--muted); margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }

/* --- MAIN APP --- */
.header { background: linear-gradient(160deg, #14083a 0%, #080810 60%); padding: 20px 16px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 40; }
.header-inner { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
.logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--purple), var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.badge { border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 700; display: inline-block; }
.content { padding: 16px; max-width: 600px; margin: 0 auto; }
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: #0d0d1a; border-top: 1px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
.tab-btn { flex: 1; padding: 9px 4px 7px; background: none; border: none; color: var(--muted); font-size: 9.5px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; font-family: 'DM Sans', sans-serif; }
.tab-btn.active { color: var(--purple); }
/* MENÚ LATERAL */
.side-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.side-overlay.open { opacity: 1; pointer-events: all; }
.side-menu { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: var(--surface); border-right: 1px solid var(--border); z-index: 301; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; }
.side-menu.open { transform: translateX(0); }
.side-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg,#14083a,var(--surface)); }
.side-logo { font-family: 'Syne',sans-serif; font-size: 18px; font-weight: 800; background: linear-gradient(135deg,var(--purple),var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.side-user { font-size: 12px; color: var(--muted); margin-top: 4px; }
.side-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: var(--text); font-size: 14px; cursor: pointer; border-bottom: 1px solid #1e1e2a; transition: background 0.15s; }
.side-item:hover { background: var(--surface2); }
.side-item-icon { font-size: 20px; width: 28px; text-align: center; }
.side-section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 12px 20px 4px; font-weight: 700; }
/* QA */
.qa-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.qa-date { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.qa-q { font-size: 13px; font-weight: 600; color: var(--purple); margin-bottom: 6px; }
.qa-a { font-size: 12px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
.tab-btn .icon { font-size: 20px; line-height: 1; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.card-purple { background: linear-gradient(135deg, #a78bfa18, var(--surface)); border: 1px solid #a78bfa28; }
.card-green  { background: linear-gradient(135deg, #34d39918, var(--surface)); border: 1px solid #34d39928; }
.card-amber  { background: linear-gradient(135deg, #fbbf2418, var(--surface)); border: 1px solid #fbbf2428; }
.card-blue   { background: linear-gradient(135deg, #60a5fa18, var(--surface)); border: 1px solid #60a5fa28; }
.card-h { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.card-sh { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stats-grid2 { grid-template-columns: repeat(2, 1fr); }
.stat-box { border-radius: 14px; padding: 12px; text-align: center; }
.stat-icon { font-size: 22px; margin-bottom: 4px; }
.stat-val  { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
.stat-lbl  { font-size: 10px; color: var(--muted); margin-top: 2px; }
.prog-wrap { height: 8px; background: var(--border); border-radius: 8px; overflow: hidden; margin: 6px 0; }
.prog-fill { height: 100%; border-radius: 8px; transition: width 1s cubic-bezier(.4,0,.2,1); }
.energy-row { display: flex; gap: 8px; }
.energy-btn { flex: 1; padding: 10px 0; border-radius: 10px; border: 2px solid var(--border); background: var(--surface2); color: var(--muted); font-weight: 700; cursor: pointer; font-size: 15px; transition: all 0.15s; }
.energy-btn.active { border-color: var(--amber); background: #fbbf2415; color: var(--amber); }
.ai-text { font-size: 13px; color: #d1d5db; line-height: 1.75; white-space: pre-wrap; }
.log-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.log-item:last-child { border-bottom: none; }
.log-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.log-date { font-size: 13px; font-weight: 700; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 2px 8px; }
.mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 52px; padding: 0 2px; }
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.bar { width: 100%; background: linear-gradient(180deg, #60a5fa, #3b82f680); border-radius: 4px 4px 0 0; }
.bar-lbl { font-size: 8px; color: #374151; }
.chat-msg { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.7; margin-bottom: 8px; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word; }
.chat-user { background: var(--surface2); color: var(--text); }
.chat-ai   { background: #a78bfa12; color: #c4b5fd; border: 1px solid #a78bfa20; }
.chat-row  { display: flex; gap: 8px; margin-top: 10px; }
.chat-row input { flex: 1; }
.chat-row button { background: var(--purple); color: #fff; border: none; border-radius: 10px; padding: 0 16px; font-size: 18px; cursor: pointer; }
.loading-overlay { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid #a78bfa30; border-radius: 24px; padding: 10px 20px; display: flex; align-items: center; gap: 8px; z-index: 100; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); animation: pulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .3s; }
.dot:nth-child(3) { animation-delay: .6s; }
.setup-wrap { min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 30px 20px 100px; }
.setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 440px; margin-top: 20px; }
.option-btn { width: 100%; text-align: left; background: var(--surface2); border: 2px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 14px; cursor: pointer; margin-bottom: 8px; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.option-btn.selected { border-color: var(--purple); background: #a78bfa15; color: var(--purple); font-weight: 600; }
.user-menu { position: absolute; right: 16px; top: 60px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 8px; z-index: 200; min-width: 160px; display: none; }
.user-menu.open { display: block; }
.user-menu-item { display: block; width: 100%; background: none; border: none; color: var(--text); font-size: 13px; padding: 10px 14px; text-align: left; cursor: pointer; border-radius: 8px; font-family: 'DM Sans', sans-serif; }
.user-menu-item:hover { background: var(--border); }
.avatar-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); background: linear-gradient(135deg, var(--purple), var(--blue)); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

@keyframes pulse { 0%,100%{opacity:.2}50%{opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.3s ease; }
* { -webkit-tap-highlight-color: transparent; }
</style>
</head>

<script>
// ---
// CONFIGURACION — edita estas lineas para cambiar precio y credenciales
// ---
const CONFIG = {
  MP_PUBLIC_KEY: 'APP_USR-ade94a33-3e1d-416d-9241-1f744a93bc6f',
  PAYMENT_ENDPOINT: 'https://mysuperfitness.netlify.app/.netlify/functions/create-preference',
  AMOUNT: 9990,
  CURRENCY: 'CLP',
  PRICE_DISPLAY: '$9.990',
};
// ---



// ════════════════════════════════════════════
// SUPABASE — Base de datos en la nube
// ════════════════════════════════════════════
const SUPA_URL = 'https://wnuehkewxbpahfbemliz.supabase.co';  // ← reemplaza con tu URL
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndudWVoa2V3eGJwYWhmYmVtbGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc1NDcsImV4cCI6MjA4OTUwMzU0N30.CQ_pICuiWPwUhMrsCl7csOzMZR3cYZuaLcMelJnnyRI';                 // ← reemplaza con tu anon key
let supa = null;

function initSupabase() {
  if (!supa && SUPA_URL !== 'https://TU-PROYECTO.supabase.co') {
    supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  }
}

async function dbSaveUser(user) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').upsert({
      email: user.email,
      name: user.name,
      password_hash: user.passwordHash,
      paid: user.paid || false,
      setup_done: false,
      created_at: new Date().toISOString(),
    }, { onConflict: 'email' });
  } catch(e) { console.log('DB save user error:', e); }
}

async function dbMarkPaid(email) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').update({
      paid: true,
      paid_at: new Date().toISOString(),
    }).eq('email', email);
    await supa.from('payments').insert({
      user_email: email,
      amount: CONFIG.AMOUNT,
      currency: CONFIG.CURRENCY,
      status: 'approved',
      created_at: new Date().toISOString(),
    });
  } catch(e) { console.log('DB mark paid error:', e); }
}

async function dbMarkSetupDone(email, goal) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').update({
      setup_done: true,
      goal: goal,
      last_active: new Date().toISOString(),
    }).eq('email', email);
  } catch(e) { console.log('DB setup done error:', e); }
}

async function dbSaveDailyLog(email, log) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('daily_logs').upsert({
      user_email: email,
      date: log.date,
      weight: parseFloat(log.weight) || null,
      body_fat: parseFloat(log.bodyFat) || null,
      calories: parseInt(log.calories) || null,
      protein: parseInt(log.protein) || null,
      sleep: parseFloat(log.sleep) || null,
      water: parseFloat(log.water) || null,
      training: log.training,
      energy: parseInt(log.energy) || null,
      notes: log.notes || null,
    }, { onConflict: 'user_email,date' });
  } catch(e) { console.log('DB log error:', e); }
}
// ════════════════════════════════════════════

const STORAGE_KEY = 'fitai_v3';
let mp = null;

let STATE = {
  lang: 'es', // idioma: es, en, fr, pt
  // Auth
  authMode: 'login', // 'login' | 'register'
  user: null,        // { email, name, paid, token }
  authLoading: false,
  authError: '',

  // Payment
  screen: 'auth',    // 'auth' | 'paywall' | 'setup' | 'app'
  payLoading: false,
  payError: '',

  // App
  profile: null,
  dailyLogs: [],
  plan: null,
  nutrition: null,
  chat: [],
  setupStep: 0,
  setupData: {},
  tab: 0,
  aiLoading: false,
  aiMsg: '',
  todayLog: { weight:'', bodyFat:'', calories:'', protein:'', sleep:'', water:'', training:'no', energy:'3', notes:'' },
  showUserMenu: false,
  showSideMenu: false,
  sideSection: null, // 'supplements' | 'harvard' | 'qa'
  qaHistory: [], // {date, q, a}
  couponApplied: false,
  couponCode: '',
  couponDiscount: 0,
  couponFinalAmount: 9990,
};

// --- PERSISTENCE ---
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      user: STATE.user,
      profile: STATE.profile,
      dailyLogs: STATE.dailyLogs,
      plan: STATE.plan,
      nutrition: STATE.nutrition,
      chat: STATE.chat,
      qaHistory: STATE.qaHistory,
    }));
  } catch{}
}
function loadSaved() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if (d.user) STATE.user = d.user;
    if (d.profile) STATE.profile = d.profile;
    if (d.dailyLogs) STATE.dailyLogs = d.dailyLogs;
    if (d.plan) STATE.plan = d.plan;
    if (d.nutrition) STATE.nutrition = d.nutrition;
    if (d.chat) STATE.chat = d.chat;
    if (d.qaHistory) STATE.qaHistory = d.qaHistory;
  } catch{}
}
loadSaved();

// --- DETECTA RETORNO DESDE MERCADOPAGO ---
const _urlParams = new URLSearchParams(window.location.search);
const _paymentStatus = _urlParams.get('payment');
if (_paymentStatus === 'success' || _urlParams.get('collection_status') === 'approved') {
  // MP aprobó el pago - recupera usuario y marca como pagado
  const pendingUser = localStorage.getItem('fitai_pending_user');
  if (pendingUser && !STATE.user) {
    STATE.user = JSON.parse(pendingUser);
  }
  if (STATE.user) {
    markAsPaid(STATE.user.email);
    STATE.screen = STATE.profile ? 'app' : 'setup';
    
    // Confirmar uso de cupón si había uno
    const returnCoupon = _urlParams.get('coupon');
    if (returnCoupon && supa) {
      supa.from('coupon_uses').update({
        payment_confirmed: true,
        payment_confirmed_at: new Date().toISOString(),
      }).eq('user_email', STATE.user.email).eq('coupon_code', returnCoupon).eq('payment_confirmed', false).then(()=>{});
    }
  }
  localStorage.removeItem('fitai_pending_email');
  localStorage.removeItem('fitai_pending_user');
  // Limpia parámetros de la URL
  window.history.replaceState({}, '', window.location.pathname);
} else if (_paymentStatus === 'failure') {
  STATE.screen = 'paywall';
  STATE.payError = 'El pago no fue aprobado. Intenta con otro medio de pago.';
  window.history.replaceState({}, '', window.location.pathname);
}

// Determine initial screen
function getInitialScreen() {
  if (!STATE.user) return 'auth';
  if (!STATE.user.paid) return 'paywall';
  if (!STATE.profile) return 'setup';
  return 'app';
}
STATE.screen = getInitialScreen();

// Si llega con #login desde la landing, asegurar pantalla de auth con modo login
if (window.location.hash === '#login') {
  if (!STATE.user) {
    STATE.authMode = 'login';
    STATE.screen = 'auth';
  }
  window.history.replaceState({}, '', window.location.pathname);
}

// --- CLAUDE API ---
const LANG_SYS = {
  es: 'Responde siempre en español.',
  en: 'Always respond in English.',
  fr: 'Réponds toujours en français.',
  pt: 'Responda sempre em português.'
};
function getSYS() {
  return `Eres un experto en ciencias del deporte, nutrición y metabolismo. Basa SIEMPRE tus respuestas en estudios e investigaciones de acceso público de Harvard Medical School y Harvard T.H. Chan School of Public Health (nutrition.harvard.edu, health.harvard.edu, hsph.harvard.edu). Cuando cites evidencia, menciona la fuente específica de Harvard. Sé preciso, científico pero accesible. Usa emojis estratégicamente. ${LANG_SYS[STATE.lang] || LANG_SYS.es}`;
}

async function claude(messages, max=1000) {
  // Control de límite diario: 2 consultas por día
  const today = new Date().toLocaleDateString('es-CL');
  const usageKey = 'fitai_usage_' + today;

async function authRegister(email, password, name, phone="") {
  // Admin superusuario
  if (email === 'admin@fitai.cl') throw new Error('Email reservado.');
  initSupabase();
  if (!supa) throw new Error('Error de conexión.');

  // Verificar si ya existe
  const { data: existing } = await supa.from('users').select('email').eq('email', email).single();
  if (existing) throw new Error('Este email ya está registrado.');

  const user = { email, name, paid: false, token: btoa(email+':'+Date.now()) };
  const { error } = await supa.from('users').insert({
    email,
    name,
    password_hash: btoa(password),
    paid: false,
    setup_done: false,
    created_at: new Date().toISOString(),
  });
  if (error) throw new Error('Error al registrar: ' + error.message);

  // Guardar también en localStorage como caché
  const users = JSON.parse(localStorage.getItem('fitai_users')||'{}');
  users[email] = { ...user, passwordHash: btoa(password) };
  localStorage.setItem('fitai_users', JSON.stringify(users));
  return user;
}

async function authLogin(email, password) {
  // Admin superusuario
  if (email === 'admin@fitai.cl' && password === 'fitai2024admin') {
    return { email: 'admin@fitai.cl', name: 'Admin', paid: true, token: 'admin-token' };
  }
  // Usuarios test sin pago
  const TEST_USERS = {
    'test1@fitai.cl': {name:'Test Usuario 1', pass:'fitai_test_1'},
    'test2@fitai.cl': {name:'Test Usuario 2', pass:'fitai_test_2'},
    'test3@fitai.cl': {name:'Test Usuario 3', pass:'fitai_test_3'},
    'test4@fitai.cl': {name:'Test Usuario 4', pass:'fitai_test_4'},
    'test5@fitai.cl': {name:'Test Usuario 5', pass:'fitai_test_5'},
  };
  if (TEST_USERS[email] && TEST_USERS[email].pass === password) {
    return { email, name: TEST_USERS[email].name, paid: true, token: 'test-token-'+email };
  }

  initSupabase();
  if (!supa) {

  if (error || !u) throw new Error('Email no encontrado.');
  if (u.password_hash !== btoa(password)) throw new Error('Contraseña incorrecta.');

  const users = JSON.parse(localStorage.getItem('fitai_users')||'{}');
  users[email] = { email: u.email, name: u.name, paid: u.paid, passwordHash: u.password_hash, token: btoa(email+':'+Date.now()) };

  return { email: u.email, name: u.name, paid: u.paid, phone: u.phone, token: btoa(email+':'+Date.now()) };
}

// Cargar perfil completo desde Supabase
async function loadProfileFromSupabase(email) {
  initSupabase(); if (!supa) return;
  try {
    // Cargar datos del usuario
    const { data: u } = await supa.from('users').select('*').eq('email', email).single();
    if (u && u.setup_done && u.goal) {
      // Reconstruir perfil desde Supabase (siempre prioriza DB)
      STATE.profile = {
        name: u.name,
        goal: u.goal,
        age: u.age,
        gender: u.gender,
        weight: u.weight_initial || u.weight,
        height: u.height,
        targetWeight: u.target_weight,
        weeksGoal: u.weeks_goal,
        activityLevel: u.activity_level,
        trainingPlace: u.training_place,
        bodyFat: u.body_fat,
        setup: true
      };
    }
    if (u && u.paid) {
      STATE.user.paid = true;
    }
    // Cargar registros diarios (siempre prioriza DB)
    const { data: logs } = await supa.from('daily_logs')
      .select('*').eq('user_email', email)
      .order('date', { ascending: false }).limit(90);
    if (logs && logs.length > 0) {
      STATE.dailyLogs = logs.map(l => ({
        date: l.date, weight: l.weight, bodyFat: l.body_fat,
        calories: l.calories, protein: l.protein, sleep: l.sleep,
        water: l.water, training: l.training, energy: l.energy, notes: l.notes
      }));
    }
    save(); // Guardar localmente para acceso offline
  } catch(e) { console.log('loadProfile error:', e); }
}

// --- MERCADOPAGO PAYMENT ---
async function processPayment() {
  STATE.payLoading = true;
  STATE.payError = '';
  render();

  try {
    // MODO DEMO: si aún no has puesto tu Public Key real
    if (!CONFIG.MP_PUBLIC_KEY || CONFIG.MP_PUBLIC_KEY === 'APP_USR-TU-PUBLIC-KEY-AQUI') {
      await new Promise(r => setTimeout(r, 1800));
      markAsPaid(STATE.user.email);
      STATE.screen = 'setup';
      STATE.payLoading = false;
      render();
      return;
    }

    // Llama al backend para crear la preferencia de pago en MP
    const res = await fetch(CONFIG.PAYMENT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: STATE.user.email,
        amount: CONFIG.AMOUNT,
        currency: CONFIG.CURRENCY,
        coupon_code: STATE.couponCode || '',
        user_name: STATE.user.name || '',
      })
    });

    const data = await res.json();
    if (!data.initPoint && !data.sandboxInitPoint) throw new Error('No se pudo crear el pago.');

    // Guarda el email para recuperarlo cuando MP redirija de vuelta
    localStorage.setItem('fitai_pending_email', STATE.user.email);
    localStorage.setItem('fitai_pending_user', JSON.stringify(STATE.user));

    // Redirige a MercadoPago - el usuario paga y vuelve automáticamente
    window.location.href = data.initPoint || data.sandboxInitPoint;

  } catch(e) {
    STATE.payError = e.message || 'Error al conectar con MercadoPago. Intenta de nuevo.';
    STATE.payLoading = false;
    render();
  }
}

// --- PROGRESS CALC ---
function calcProgress() {
  const logs = STATE.dailyLogs;
  const sw = parseFloat(STATE.profile?.weight)||0;
  const tw = parseFloat(STATE.profile?.targetWeight)||sw;
  const lw = logs.length ? (parseFloat(logs[0]?.weight)||sw) : sw;
  const lost = sw - lw;
  const total = sw - tw;
  const pct = total > 0 ? Math.min(100, Math.max(0, (lost/total)*100)) : 0;
  const trend = logs.slice(0,14).reverse().map(l=>({date:l.date,w:parseFloat(l.weight)||null})).filter(l=>l.w);
  return { lost:lost.toFixed(1), pct:pct.toFixed(0), days:logs.length, trend, lw:lw||sw };
}

    const code = div.querySelector('#coupon-input')?.value?.trim().toUpperCase();

    if (!code) { msgEl.style.display='block'; msgEl.style.color='#f87171'; msgEl.textContent='Ingresa un código de cupón'; return; }
    
    msgEl.style.display='block'; msgEl.style.color='var(--muted)'; msgEl.textContent='Verificando cupón…';
    
    initSupabase();
    if (supa) {
      try {
        const { data: coupon, error } = await supa.from('coupons').select('*').eq('code', code).eq('active', true).single();
        if (error || !coupon) {
          msgEl.style.color='#f87171'; msgEl.textContent='❌ Cupón inválido o expirado';
          STATE.couponApplied = false; STATE.couponCode = ''; STATE.couponDiscount = 0; STATE.couponFinalAmount = 9990;
        } else {
          const finalAmount = Math.max(100, CONFIG.AMOUNT - coupon.discount_amount);
          STATE.couponApplied = true;
          STATE.couponCode = code;
          STATE.couponDiscount = coupon.discount_amount;
          STATE.couponFinalAmount = finalAmount;
          msgEl.style.color='var(--green)'; msgEl.textContent=`✅ Cupón aplicado: -$${coupon.discount_amount.toLocaleString('es-CL')} de descuento`;
        }
        render();
      } catch(e) {
        msgEl.style.color='#f87171'; msgEl.textContent='Error al verificar cupón';
      }
    } else {
      msgEl.style.color='#f87171'; msgEl.textContent='Error de conexión';
    }
  };
  
  return div;
}

function renderSetup() {
  const wrap = document.createElement('div');
  wrap.className = 'setup-wrap';

  if (STATE.aiLoading) {
    wrap.innerHTML = `<div style="text-align:center;padding-top:60px"><div style="font-size:56px;margin-bottom:16px">🧠</div><div style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:var(--purple)">Generando tu plan…</div><div style="color:var(--muted);font-size:13px;margin-top:8px">Analizando con principios de Harvard</div><div style="display:flex;justify-content:center;gap:8px;margin-top:24px"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    return wrap;
  }

  const step = STEPS[STATE.setupStep];
  const pct = (STATE.setupStep/STEPS.length)*100;

  wrap.innerHTML = `
    <div class="screen-logo">🏋️</div>
    <div class="screen-title">Configura tu plan</div>
    <div class="screen-sub">Hola ${STATE.user?.name}! Cuéntanos sobre ti.</div>
    <div style="width:100%;max-width:440px;margin-top:20px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:var(--muted)">Configuración inicial</span>
        <span style="font-size:11px;color:var(--purple)">${STATE.setupStep+1}/${STEPS.length}</span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--purple),#7c3aed)"></div></div>
    </div>
    <div class="setup-card">
      <div style="font-size:12px;color:var(--purple);font-weight:700;margin-bottom:14px">Paso ${STATE.setupStep+1}</div>
      <div style="font-family:Syne,sans-serif;font-size:17px;font-weight:700;margin-bottom:20px;line-height:1.4">${step.q}</div>
      <div id="step-inp"></div>
      <button class="btn btn-purple" id="btn-next" style="margin-top:16px">${STATE.setupStep===STEPS.length-1?'🚀 Generar mi plan':'Continuar →'}</button>
      ${STATE.setupStep>0?`<button class="btn btn-ghost" id="btn-back">← Atrás</button>`:''}
    </div>`;

  const inp = wrap.querySelector('#step-inp');
  if (step.type==='select') {
    step.opts.forEach(o => {
      const b=document.createElement('button'); b.className='option-btn'+(STATE.setupData[step.key]===o?' selected':''); b.textContent=o;
      b.onclick=()=>{STATE.setupData[step.key]=o;render();};
      inp.appendChild(b);
    });
  } else {
    const el=document.createElement('input'); el.type=step.type; el.placeholder=step.ph; el.value=STATE.setupData[step.key]||''; el.style.cssText='width:100%';
    el.oninput=e=>STATE.setupData[step.key]=e.target.value;
    el.onkeydown=e=>{if(e.key==='Enter')wrap.querySelector('#btn-next')?.click();};
    inp.appendChild(el); setTimeout(()=>el.focus(),100);
  }

  wrap.querySelector('#btn-next').onclick = async () => {
    const val=STATE.setupData[step.key];
    if(step.key!=='bodyFat'&&!val){inp.querySelector('input,select')?.focus();return;}
    if(STATE.setupStep<STEPS.length-1){STATE.setupStep++;render();}
    else {
      STATE.aiLoading=true; render();
      const p=STATE.setupData;
      const desc=`${p.name}, ${p.age}años, ${p.gender}, ${p.weight}kg, ${p.height}cm, objetivo: ${p.goal}, meta: ${p.targetWeight}kg en ${p.weeksGoal} semanas, actividad: ${p.activityLevel}`;
      
      // Timeout de 25 segundos
      const withTimeout = (promise, ms) => Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
      ]);

      try {
        const planR = await withTimeout(
          claude([{role:'user',content:`Plan entrenamiento semanal para ${desc}, lugar de entrenamiento: ${p.trainingPlace||'gimnasio'}. ${p.trainingPlace?.includes('casa')?'Solo ejercicios sin equipamiento de gimnasio.':'Con equipamiento de gimnasio completo.'} Máx 250 palabras.`}]),
          25000
        );
        const nutR = await withTimeout(
          claude([{role:'user',content:`Plan alimentación diario para ${desc}. 5 comidas. Máx 250 palabras.`}]),
          25000
        );
        STATE.profile={...p,setup:true};
        dbMarkSetupDone(STATE.user?.email, p.goal);
        // Guardar perfil completo en Supabase
        if (supa) {
          await supa.from('users').update({
            goal: p.goal, age: parseInt(p.age), gender: p.gender,
            weight_initial: parseFloat(p.weight), weight: parseFloat(p.weight),
            height: parseFloat(p.height), target_weight: parseFloat(p.targetWeight),
            weeks_goal: parseInt(p.weeksGoal), activity_level: p.activityLevel,
            training_place: p.trainingPlace, body_fat: parseFloat(p.bodyFat)||null,
            setup_done: true, last_active: new Date().toISOString()
          }).eq('email', STATE.user?.email);
        }
        STATE.plan=planR;
        STATE.nutrition=nutR;
        STATE.screen='app';
      } catch(e) {
        // Si falla, igual entra a la app con plan por defecto
        STATE.profile={...p,setup:true};
        STATE.plan='⚠️ Hubo un problema generando tu plan. Toca "🔄 Nueva semana" en la sección Entrenamiento para generarlo.';
        STATE.nutrition='⚠️ Hubo un problema generando tu menú. Toca "🔄 Nuevo menú" en la sección Nutrición para generarlo.';
        STATE.screen='app';
      }
      STATE.aiLoading=false;
      save();
      render();
    }
  };
  wrap.querySelector('#btn-back')?.addEventListener('click',()=>{STATE.setupStep--;render();});
  return wrap;
}

function renderMiniChart(trend) {
  const weights=trend.map(t=>t.w),mn=Math.min(...weights)-1,mx=Math.max(...weights)+1;
  return `<div class="card"><div class="card-sh">📉 Tendencia de peso</div><div class="mini-chart">${trend.map(t=>{const h=Math.round(((t.w-mn)/(mx-mn))*40+8);return`<div class="bar-wrap"><div class="bar" style="height:${h}px"></div><div class="bar-lbl">${(t.date||'').slice(0,5)}</div></div>`;}).join('')}</div></div>`;
}

// --- PROGRESS ---
function buildWeightChart(logs) {
  const withWeight = logs.filter(l => l.weight && parseFloat(l.weight) > 0).slice(0, 30).reverse();
  if (withWeight.length < 2) return '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Registra tu peso diariamente para ver el gráfico 📊</div>';
  const weights = withWeight.map(l => parseFloat(l.weight));
  const dates = withWeight.map(l => l.date?.slice(0,5) || '');
  const mn = Math.min(...weights) - 0.5;
  const mx = Math.max(...weights) + 0.5;
  const W = 300, H = 120, pad = 30;
  const xScale = i => pad + (i / (withWeight.length - 1)) * (W - pad * 2);
  const yScale = v => H - pad - ((v - mn) / (mx - mn)) * (H - pad * 2);
  const points = weights.map((w, i) => `${xScale(i)},${yScale(w)}`).join(' ');
  const area = `${xScale(0)},${H-10} ` + weights.map((w,i) => `${xScale(i)},${yScale(w)}`).join(' ') + ` ${xScale(weights.length-1)},${H-10}`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#wg)"/>
    <polyline points="${points}" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${weights.map((w,i) => `<circle cx="${xScale(i)}" cy="${yScale(w)}" r="3.5" fill="#a78bfa"/>
    <text x="${xScale(i)}" y="${yScale(w)-8}" text-anchor="middle" font-size="9" fill="#a78bfa">${w}</text>`).join('')}
    ${weights.length > 1 ? dates.filter((_,i) => i === 0 || i === Math.floor(weights.length/2) || i === weights.length-1).map((d,_,arr) => {
      const origIdx = d === dates[0] ? 0 : d === dates[Math.floor(weights.length/2)] ? Math.floor(weights.length/2) : weights.length-1;
      return `<text x="${xScale(origIdx)}" y="${H-2}" text-anchor="middle" font-size="8" fill="#6b7280">${d}</text>`;
    }).join('') : ''}
  </svg>`;
}
