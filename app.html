<!DOCTYPE html>

<style>
:root {
  --bg: #080810; --surface: #10101c; --surface2: #16162a;
  --border: #1e1e38; --text: #f0f0ff; --muted: #8b8fa8;
  --purple: #a78bfa; --blue: #60a5fa; --green: #34d399;
  --amber: #fbbf24; --lime: #b8ff57;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
h1,h2,h3 { font-family: 'Syne', sans-serif; letter-spacing: -0.3px; }
input, select, textarea { font-family: 'DM Sans', sans-serif; color-scheme: dark; }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#app { min-height: 100vh; padding-bottom: 72px; }

/* --- AUTH / PAYWALL SCREENS --- */
.screen {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 30px 20px; background: var(--bg);
}
.screen-logo { font-size: 56px; margin-bottom: 12px; }
.screen-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--lime), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
.screen-sub { font-size: 14px; color: var(--muted); margin-top: 6px; text-align: center; line-height: 1.7; }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 400px; margin-top: 24px; }
.auth-tabs { display: flex; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 9px; border: none; border-radius: 9px; background: none; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 6px #00000040; }
.field { margin-bottom: 14px; }
.field label { font-size: 13px; color: var(--muted); margin-bottom: 5px; display: block; font-weight: 500; }
input[type=text], input[type=email], input[type=password], input[type=number], select, textarea {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; color: var(--text); font-size: 14px; width: 100%; outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--purple); }
textarea { resize: none; height: 72px; }
.btn { border: none; border-radius: 12px; padding: 13px 20px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; font-family: 'Syne', sans-serif; transition: transform 0.1s, opacity 0.2s; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-lime { background: var(--lime); color: #000; }
.btn-purple { background: linear-gradient(135deg, var(--purple), #7c3aed); color: #fff; }
.btn-green  { background: linear-gradient(135deg, var(--green), #059669); color: #fff; }
.btn-amber  { background: linear-gradient(135deg, var(--amber), #d97706); color: #000; }
.btn-blue   { background: linear-gradient(135deg, var(--blue), #2563eb); color: #fff; }
.btn-ghost  { background: var(--surface2); color: var(--muted); }
.btn-sm     { padding: 9px 16px; font-size: 13px; width: auto; margin-top: 0; }
.err { background: #f8717115; border: 1px solid #f8717130; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #f87171; margin-bottom: 12px; display: none; }
.err.show { display: block; }
.link-btn { background: none; border: none; color: var(--purple); cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; text-decoration: underline; padding: 0; }

/* --- PAYWALL --- */
.paywall-card { background: var(--surface); border: 2px solid var(--lime); border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 420px; margin-top: 20px; text-align: center; position: relative; overflow: hidden; }
.paywall-card::before { content: ''; position: absolute; top: -60px; left: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #b8ff5712, transparent 70%); }
.paywall-price { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 900; color: var(--lime); line-height: 1; margin: 16px 0 4px; }
.paywall-period { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.paywall-features { text-align: left; margin-bottom: 28px; }
.paywall-feat { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 13px; color: var(--muted); }
.paywall-feat::before { content: '✓'; color: var(--lime); font-weight: 800; flex-shrink: 0; }
.stripe-element { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
.stripe-element.StripeElement--focus { border-color: var(--purple); }
.secure-badge { font-size: 11px; color: var(--muted); margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }

/* --- MAIN APP --- */
.header { background: linear-gradient(160deg, #14083a 0%, #080810 60%); padding: 20px 16px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 40; }
.header-inner { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
.logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--purple), var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.badge { border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 700; display: inline-block; }
.content { padding: 16px; max-width: 600px; margin: 0 auto; }
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: #0d0d1a; border-top: 1px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
.tab-btn { flex: 1; padding: 9px 4px 7px; background: none; border: none; color: var(--muted); font-size: 10px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; font-family: 'DM Sans', sans-serif; }
.tab-btn.active { color: var(--purple); }
/* MENÚ LATERAL */
.side-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.side-overlay.open { opacity: 1; pointer-events: all; }
.side-menu { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: var(--surface); border-right: 1px solid var(--border); z-index: 301; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; }
.side-menu.open { transform: translateX(0); }
.side-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg,#14083a,var(--surface)); }
.side-logo { font-family: 'Syne',sans-serif; font-size: 18px; font-weight: 800; background: linear-gradient(135deg,var(--purple),var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.side-user { font-size: 12px; color: var(--muted); margin-top: 4px; }
.side-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: var(--text); font-size: 14px; cursor: pointer; border-bottom: 1px solid #1e1e2a; transition: background 0.15s; }
.side-item:hover { background: var(--surface2); }
.side-item-icon { font-size: 20px; width: 28px; text-align: center; }
.side-section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 12px 20px 4px; font-weight: 700; }
/* QA */
.qa-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
.qa-date { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
.qa-q { font-size: 14px; font-weight: 600; color: var(--purple); margin-bottom: 8px; }
.qa-a { font-size: 13px; color: #c0c4d8; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; }
.tab-btn .icon { font-size: 20px; line-height: 1; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.card-purple { background: linear-gradient(135deg, #a78bfa18, var(--surface)); border: 1px solid #a78bfa28; }
.card-green  { background: linear-gradient(135deg, #34d39918, var(--surface)); border: 1px solid #34d39928; }
.card-amber  { background: linear-gradient(135deg, #fbbf2418, var(--surface)); border: 1px solid #fbbf2428; }
.card-blue   { background: linear-gradient(135deg, #60a5fa18, var(--surface)); border: 1px solid #60a5fa28; }
.card-h { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 12px; }
.card-sh { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stats-grid2 { grid-template-columns: repeat(2, 1fr); }
.stat-box { border-radius: 14px; padding: 12px; text-align: center; }
.stat-icon { font-size: 22px; margin-bottom: 4px; }
.stat-val  { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
.stat-lbl  { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; }
.prog-wrap { height: 8px; background: var(--border); border-radius: 8px; overflow: hidden; margin: 6px 0; }
.prog-fill { height: 100%; border-radius: 8px; transition: width 1s cubic-bezier(.4,0,.2,1); }
.energy-row { display: flex; gap: 8px; }
.energy-btn { flex: 1; padding: 10px 0; border-radius: 10px; border: 2px solid var(--border); background: var(--surface2); color: var(--muted); font-weight: 700; cursor: pointer; font-size: 15px; transition: all 0.15s; }
.energy-btn.active { border-color: var(--amber); background: #fbbf2415; color: var(--amber); }
.ai-text { font-size: 14px; color: #e0e0f0; line-height: 1.8; white-space: pre-wrap; }

/* Exercise / Nutrition item cards */
.ex-card {
  display: flex; align-items: stretch; gap: 0;
  background: linear-gradient(145deg, #141228, #0e0c1f);
  border-radius: 14px; padding: 0; margin: 8px 0;
  border: 1px solid #ffffff08; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  cursor: pointer; transition: transform 0.1s, border-color 0.2s;
}
.ex-card:active { transform: scale(0.98); }
.ex-card[data-imgs]:hover, .ex-card[data-imgs]:active { border-color: #ffffff15; }
.ex-card-accent {
  width: 4px; flex-shrink: 0; border-radius: 4px 0 0 4px;
}
.ex-card-info { flex: 1; padding: 12px 14px; }
.ex-card-name { font-size: 14px; font-weight: 700; color: #f1f5f9; line-height: 1.35; margin-bottom: 3px; }
.ex-card-detail { font-size: 12px; color: #64748b; line-height: 1.45; margin-bottom: 6px; }
.ex-card-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 9.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 3px 9px; border-radius: 20px;
}
.ex-card-tap {
  display: flex; align-items: center; justify-content: center;
  width: 32px; flex-shrink: 0; color: #475569; font-size: 16px;
  border-left: 1px solid #ffffff06;
}

/* Exercise Modal */
.ex-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
}
.ex-modal-overlay.open { opacity: 1; pointer-events: all; }
.ex-modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; width: 100%; max-width: 400px;
  max-height: 85vh; overflow-y: auto; position: relative;
  transform: translateY(20px) scale(0.95);
  transition: transform 0.25s ease;
}
.ex-modal-overlay.open .ex-modal { transform: translateY(0) scale(1); }
.ex-modal-close {
  position: sticky; top: 0; z-index: 2;
  display: flex; justify-content: flex-end; padding: 12px 14px 0;
}
.ex-modal-close button {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.ex-modal-header {
  padding: 8px 20px 14px; text-align: center;
}
.ex-modal-title {
  font-family: 'Syne', sans-serif; font-size: 18px;
  font-weight: 800; margin-bottom: 4px;
}
.ex-modal-muscle { font-size: 12px; font-weight: 600; }
.ex-modal-images {
  display: flex; gap: 8px; padding: 0 16px 16px;
}
.ex-modal-images img {
  flex: 1; border-radius: 12px; background: #1a1735;
  min-height: 160px; object-fit: cover;
  border: 1px solid var(--border);
}
.ex-modal-label {
  text-align: center; font-size: 11px; color: var(--muted);
  font-weight: 600; margin-top: 6px;
}
.ex-modal-instructions {
  padding: 0 20px 20px; font-size: 13px; color: #c0c4d8;
  line-height: 1.7;
}
.ex-modal-instructions li { margin-bottom: 6px; }
.plan-section-title {
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--purple); margin: 18px 0 8px; padding: 8px 0;
  border-bottom: 1px solid #a78bfa18;
}
.plan-section-title.nut { color: var(--green); border-bottom-color: #34d39918; }
.plan-text-line { font-size: 13.5px; color: #c0c4d8; line-height: 1.7; margin: 4px 0; }

/* Meal cards */
.meal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; margin-bottom: 14px; overflow: hidden;
}
.meal-card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; cursor: pointer;
  transition: background 0.15s;
}
.meal-card-header:active { background: var(--surface2); }
.meal-card-icon { font-size: 24px; width: 36px; text-align: center; }
.meal-card-title { flex: 1; }
.meal-card-name {
  font-family: 'Syne', sans-serif; font-size: 15px;
  font-weight: 700; line-height: 1.3;
}
.meal-card-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.meal-card-arrow { color: var(--muted); font-size: 16px; padding: 0 4px; }
.meal-card-items {
  padding: 0 16px 14px; border-top: 1px solid var(--border);
}
.meal-card-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; font-size: 13.5px; color: #d0d4e8;
  border-bottom: 1px solid #ffffff06;
}
.meal-card-item:last-child { border-bottom: none; }
.meal-card-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.log-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.log-item:last-child { border-bottom: none; }
.log-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.log-date { font-size: 14px; font-weight: 700; }
.tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 3px 10px; font-weight: 500; }
.mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 52px; padding: 0 2px; }
.bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.bar { width: 100%; background: linear-gradient(180deg, #60a5fa, #3b82f680); border-radius: 4px 4px 0 0; }
.bar-lbl { font-size: 8px; color: #374151; }
.chat-msg { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.7; margin-bottom: 8px; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word; }
.chat-user { background: var(--surface2); color: var(--text); }
.chat-ai   { background: #a78bfa12; color: #c4b5fd; border: 1px solid #a78bfa20; }
.chat-row  { display: flex; gap: 8px; margin-top: 10px; }
.chat-row input { flex: 1; }
.chat-row button { background: var(--purple); color: #fff; border: none; border-radius: 10px; padding: 0 16px; font-size: 18px; cursor: pointer; }
.loading-overlay { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid #a78bfa30; border-radius: 24px; padding: 10px 20px; display: flex; align-items: center; gap: 8px; z-index: 100; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); animation: pulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .3s; }
.dot:nth-child(3) { animation-delay: .6s; }
.setup-wrap { min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 30px 20px 100px; }
.setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 440px; margin-top: 20px; }
.option-btn { width: 100%; text-align: left; background: var(--surface2); border: 2px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 14px; cursor: pointer; margin-bottom: 8px; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.option-btn.selected { border-color: var(--purple); background: #a78bfa15; color: var(--purple); font-weight: 600; }
.user-menu { position: absolute; right: 16px; top: 60px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 8px; z-index: 200; min-width: 160px; display: none; }
.user-menu.open { display: block; }
.user-menu-item { display: block; width: 100%; background: none; border: none; color: var(--text); font-size: 13px; padding: 10px 14px; text-align: left; cursor: pointer; border-radius: 8px; font-family: 'DM Sans', sans-serif; }
.user-menu-item:hover { background: var(--border); }
.avatar-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); background: linear-gradient(135deg, var(--purple), var(--blue)); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

@keyframes pulse { 0%,100%{opacity:.2}50%{opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.3s ease; }
* { -webkit-tap-highlight-color: transparent; }

<script>
// ---
// CONFIGURACION — edita estas lineas para cambiar precio y credenciales

const CONFIG = {

  PAYMENT_ENDPOINT: 'https://mysuperfitness.netlify.app/.netlify/functions/create-preference',
  AMOUNT: 9990,
  CURRENCY: 'CLP',
  PRICE_DISPLAY: '$9.990',
};
// ---



// ════════════════════════════════════════════
// SUPABASE — Base de datos en la nube
// ════════════════════════════════════════════
const SUPA_URL = 'https://wnuehkewxbpahfbemliz.supabase.co';  // ← reemplaza con tu URL
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndudWVoa2V3eGJwYWhmYmVtbGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc1NDcsImV4cCI6MjA4OTUwMzU0N30.CQ_pICuiWPwUhMrsCl7csOzMZR3cYZuaLcMelJnnyRI';                 // ← reemplaza con tu anon key
let supa = null;

function initSupabase() {
  if (!supa && SUPA_URL !== 'https://TU-PROYECTO.supabase.co') {
    supa = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  }
}

async function dbSaveUser(user) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').upsert({
      email: user.email,
      name: user.name,
      password_hash: user.passwordHash,
      paid: user.paid || false,
      setup_done: false,
      created_at: new Date().toISOString(),
    }, { onConflict: 'email' });
  } catch(e) { console.log('DB save user error:', e); }
}

async function dbMarkPaid(email) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').update({
      paid: true,
      paid_at: new Date().toISOString(),
    }).eq('email', email);
    await supa.from('payments').insert({
      user_email: email,
      amount: CONFIG.AMOUNT,
      currency: CONFIG.CURRENCY,
      status: 'approved',
      created_at: new Date().toISOString(),
    });
  } catch(e) { console.log('DB mark paid error:', e); }
}

async function dbMarkSetupDone(email, goal) {
  initSupabase(); if (!supa) return;
  try {
    await supa.from('users').update({
      setup_done: true,
      goal: goal,
      last_active: new Date().toISOString(),
    }).eq('email', email);
  } catch(e) { console.log('DB setup done error:', e); }

async function dbSaveDailyLog(email, log) {

async function claude(messages, max=1000) {

async function authRegister(email, password, name, phone="") {
  // Admin superusuario
  if (email === 'admin@fitai.cl') throw new Error('Email reservado.');
  initSupabase();
  if (!supa) throw new Error('Error de conexión.');

  // Verificar si ya existe
  const { data: existing } = await supa.from('users').select('email').eq('email', email).single();
  if (existing) throw new Error('Este email ya está registrado.');

  const user = { email, name, paid: false, token: btoa(email+':'+Date.now()) };
  const { error } = await supa.from('users').insert({
    email,
    name,
    password_hash: btoa(password),
    paid: false,
    setup_done: false,
    created_at: new Date().toISOString(),
  });
  if (error) throw new Error('Error al registrar: ' + error.message);

  // Guardar también en localStorage como caché
  const users = JSON.parse(localStorage.getItem('fitai_users')||'{}');
  users[email] = { ...user, passwordHash: btoa(password) };
  localStorage.setItem('fitai_users', JSON.stringify(users));
  return user;
}

async function authLogin(email, password) {
  // Admin superusuario
  if (email === 'admin@fitai.cl' && password === 'fitai2024admin') {
    return { email: 'admin@fitai.cl', name: 'Admin', paid: true, token: 'admin-token' };
  }
  // Usuarios test sin pago
  const TEST_USERS = {

    'test2@fitai.cl': {name:'Test Usuario 2', pass:'fitai_test_2'},
    'test3@fitai.cl': {name:'Test Usuario 3', pass:'fitai_test_3'},
    'test4@fitai.cl': {name:'Test Usuario 4', pass:'fitai_test_4'},

  if (TEST_USERS[email] && TEST_USERS[email].pass === password) {
    return { email, name: TEST_USERS[email].name, paid: true, token: 'test-token-'+email };
  }

  initSupabase();

// Cargar perfil completo desde Supabase
async function loadProfileFromSupabase(email) {
  initSupabase(); if (!supa) return;
  try {
    // Cargar datos del usuario
    const { data: u } = await supa.from('users').select('*').eq('email', email).single();
    if (u && u.setup_done && u.goal) {
      // Reconstruir perfil desde Supabase (siempre prioriza DB)
      STATE.profile = {
        name: u.name,
        goal: u.goal,
        age: u.age,
        gender: u.gender,
        weight: u.weight_initial || u.weight,
        height: u.height,
        targetWeight: u.target_weight,
        weeksGoal: u.weeks_goal,
        activityLevel: u.activity_level,
        trainingPlace: u.training_place,
        bodyFat: u.body_fat,
        setup: true
      };
    }
    if (u && u.paid) {
      STATE.user.paid = true;
    }
    // Cargar plan y nutrición guardados
    if (u && u.current_plan) STATE.plan = u.current_plan;
    if (u && u.current_nutrition) STATE.nutrition = u.current_nutrition;
    if (u && u.plan_generated_at) STATE.planGeneratedAt = u.plan_generated_at;
    // Cargar registros diarios (siempre prioriza DB)
    const { data: logs } = await supa.from('daily_logs')
      .select('*').eq('user_email', email)
      .order('date', { ascending: false }).limit(90);
    if (logs && logs.length > 0) {
      STATE.dailyLogs = logs.map(l => ({
        date: l.date, weight: l.weight, bodyFat: l.body_fat,
        calories: l.calories, protein: l.protein, sleep: l.sleep,
        water: l.water, training: l.training, energy: l.energy, notes: l.notes
      }));
    }
    save(); // Guardar localmente para acceso offline
  } catch(e) { console.log('loadProfile error:', e); }
}

// --- MERCADOPAGO PAYMENT ---
async function processPayment() {
  STATE.payLoading = true;
  STATE.payError = '';
  render();

  try {
    // MODO DEMO: si aún no has puesto tu Public Key real
    if (!CONFIG.MP_PUBLIC_KEY || CONFIG.MP_PUBLIC_KEY === 'APP_USR-TU-PUBLIC-KEY-AQUI') {
      await new Promise(r => setTimeout(r, 1800));
      markAsPaid(STATE.user.email);
      STATE.screen = 'setup';
      STATE.payLoading = false;
      render();
      return;
    }

    // Llama al backend para crear la preferencia de pago en MP
    const res = await fetch(CONFIG.PAYMENT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: STATE.user.email,
        amount: CONFIG.AMOUNT,
        currency: CONFIG.CURRENCY,
        coupon_code: STATE.couponCode || '',
        user_name: STATE.user.name || '',
      })
    });

    const data = await res.json();
    if (!data.initPoint && !data.sandboxInitPoint) throw new Error('No se pudo crear el pago.');

    // Guarda el email para recuperarlo cuando MP redirija de vuelta
    localStorage.setItem('fitai_pending_email', STATE.user.email);
    localStorage.setItem('fitai_pending_user', JSON.stringify(STATE.user));

    // Redirige a MercadoPago - el usuario paga y vuelve automáticamente
    window.location.href = data.initPoint || data.sandboxInitPoint;

  } catch(e) {
    STATE.payError = e.message || 'Error al conectar con MercadoPago. Intenta de nuevo.';
    STATE.payLoading = false;
    render();
  }
}

// --- PROGRESS CALC ---
function calcProgress() {
  const logs = STATE.dailyLogs;
  const sw = parseFloat(STATE.profile?.weight)||0;
  const tw = parseFloat(STATE.profile?.targetWeight)||sw;
  const lw = logs.length ? (parseFloat(logs[0]?.weight)||sw) : sw;
  const lost = sw - lw;
  const total = sw - tw;
  const pct = total > 0 ? Math.min(100, Math.max(0, (lost/total)*100)) : 0;
  const trend = logs.slice(0,14).reverse().map(l=>({date:l.date,w:parseFloat(l.weight)||null})).filter(l=>l.w);
  return { lost:lost.toFixed(1), pct:pct.toFixed(0), days:logs.length, trend, lw:lw||sw };
}

// --- RENDER ---
function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';
  root.style.position = 'relative';

  if (STATE.screen === 'auth') { root.appendChild(renderAuth()); return; }
  if (STATE.screen === 'paywall') { root.appendChild(renderPaywall()); return; }
  if (STATE.screen === 'setup' && !STATE.profile) { root.appendChild(renderSetup()); return; }

  // Sección de menú lateral activa
  if (STATE.sideSection) {
    root.appendChild(renderSideSection());
    root.appendChild(renderTabBar());
    return;
  }

  root.appendChild(renderHeader());
  const content = document.createElement('div');
  content.className = 'content fade-in';
  const tabs = [renderDashboard, renderWorkout, renderNutrition, renderLog, renderProgress];
  content.appendChild(tabs[STATE.tab]());
  root.appendChild(content);
  root.appendChild(renderTabBar());

  // Menú lateral overlay
  if (STATE.showSideMenu) {
    const overlay = document.createElement('div');
    overlay.className = 'side-overlay open';
    overlay.onclick = () => { STATE.showSideMenu = false; render(); };
    root.appendChild(overlay);

    const menu = document.createElement('div');
    menu.className = 'side-menu open';
    menu.innerHTML = `
      <div class="side-header">
        <div class="side-logo">⚡ FitAI Pro</div>
        <div class="side-user">${STATE.user?.name || ''} · ${STATE.user?.email || ''}</div>
      </div>
      <div class="side-section-title">Contenido Científico</div>
      <div class="side-item" id="sm-supplements"><span class="side-item-icon">💊</span>Top 10 Suplementos</div>
      <div class="side-item" id="sm-harvard"><span class="side-item-icon">🔬</span>Top 10 Estudios Harvard</div>
      <div class="side-section-title">Mi Historia</div>
      <div class="side-item" id="sm-qa"><span class="side-item-icon">💬</span>Mis Preguntas y Respuestas</div>

      <div class="side-item" id="sm-logout" style="color:#f87171"><span class="side-item-icon">🚪</span>Cerrar sesión</div>

    menu.querySelector('#sm-harvard').onclick = () => { STATE.showSideMenu=false; STATE.sideSection='harvard'; render(); };
    menu.querySelector('#sm-qa').onclick = () => { STATE.showSideMenu=false; STATE.sideSection='qa'; render(); };
    menu.querySelector('#sm-logout').onclick = () => { STATE.user=null; STATE.profile=null; STATE.dailyLogs=[]; STATE.plan=null; STATE.nutrition=null; STATE.chat=[]; STATE.screen='auth'; STATE.showSideMenu=false; STATE.sideSection=null; save(); render(); };
    root.appendChild(menu);
  }

  if (STATE.showUserMenu) {
    const menu = document.createElement('div');
    menu.className = 'user-menu open';
    menu.innerHTML = `
      <div style="padding:8px 14px 8px;border-bottom:1px solid var(--border);margin-bottom:4px">
        <div style="font-size:12px;font-weight:700">${STATE.user?.name||'Usuario'}</div>
        <div style="font-size:11px;color:var(--muted)">${STATE.user?.email||''}</div>
      </div>
      <button class="user-menu-item" id="menu-reset">🔄 Reiniciar programa</button>
      <button class="user-menu-item" id="menu-logout" style="color:#f87171">🚪 Cerrar sesión</button>`;
    root.appendChild(menu);
    menu.querySelector('#menu-reset').onclick = () => {
      if(confirm('¿Reiniciar todo el programa?')) { STATE.profile=null; STATE.dailyLogs=[]; STATE.plan=null; STATE.nutrition=null; STATE.chat=[]; STATE.setupStep=0; STATE.setupData={}; STATE.aiMsg=''; STATE.screen='setup'; STATE.showUserMenu=false; save(); render(); }
    };
    menu.querySelector('#menu-logout').onclick = () => { STATE.user=null; STATE.profile=null; STATE.dailyLogs=[]; STATE.plan=null; STATE.nutrition=null; STATE.chat=[]; STATE.screen='auth'; STATE.showUserMenu=false; save(); render(); };
    document.addEventListener('click', function handler(e) { if(!menu.contains(e.target)) { STATE.showUserMenu=false; document.removeEventListener('click',handler); render(); } }, {once:true});
  }

  if (STATE.aiLoading) {
    const ov = document.createElement('div');
    ov.className = 'loading-overlay';
    ov.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="font-size:12px;color:var(--purple)">Procesando con IA…</span>';
    root.appendChild(ov);
  }
}

// --- AUTH SCREEN ---
function renderAuth() {
  const div = document.createElement('div');
  div.className = 'screen';
  div.innerHTML = `
    <div class="screen-logo">⚡</div>
    <div class="screen-title">FitAI Pro</div>
    <div class="screen-sub">Tu entrenador personal con IA · Solo $9.990 CLP</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab ${STATE.authMode==='login'?'active':''}" id="tab-login">Ingresar</button>
        <button class="auth-tab ${STATE.authMode==='register'?'active':''}" id="tab-reg">Crear cuenta</button>
      </div>
      <div class="err ${STATE.authError?'show':''}" id="auth-err">${STATE.authError}</div>
      ${STATE.authMode==='register'?`
        <div class="field"><label>Tu nombre</label><input type="text" id="auth-name" placeholder="Nombre completo"/></div>
      <div class="field"><label>Teléfono (WhatsApp)</label><input type="tel" id="auth-phone" placeholder="+56 9 1234 5678"/></div>
      `:''}
      <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="tu@email.com"/></div>
      <div class="field"><label>Contraseña</label><input type="password" id="auth-pass" placeholder="••••••••"/></div>
      <button class="btn btn-lime" id="btn-auth" ${STATE.authLoading?'disabled':''}>
        ${STATE.authLoading?'Cargando…':STATE.authMode==='login'?'Ingresar →':'Crear cuenta →'}
      </button>
      ${STATE.authMode==='login'?`<p style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">¿No tienes cuenta? <button class="link-btn" id="to-reg">Regístrate aquí</button></p>`:`<p style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">¿Ya tienes cuenta? <button class="link-btn" id="to-login">Ingresa aquí</button></p>`}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:16px;text-align:center">🔒 Tus datos están seguros y cifrados</p>`;

  div.querySelector('#tab-login').onclick = () => { STATE.authMode='login'; STATE.authError=''; render(); };
  div.querySelector('#tab-reg').onclick = () => { STATE.authMode='register'; STATE.authError=''; render(); };
  const toReg = div.querySelector('#to-reg');
  if (toReg) toReg.onclick = () => { STATE.authMode='register'; STATE.authError=''; render(); };
  const toLogin = div.querySelector('#to-login');
  if (toLogin) toLogin.onclick = () => { STATE.authMode='login'; STATE.authError=''; render(); };

  div.querySelector('#btn-auth').onclick = async () => {
    const email = div.querySelector('#auth-email')?.value?.trim();
    const pass = div.querySelector('#auth-pass')?.value;
    const name = div.querySelector('#auth-name')?.value?.trim();
    const phone = div.querySelector('#auth-phone')?.value?.trim() || '';
    if (!email || !pass) { STATE.authError='Completa todos los campos.'; render(); return; }
    STATE.authLoading = true; STATE.authError = ''; render();
    try {
      if (STATE.authMode === 'register') {
        if (!name) { throw new Error('Ingresa tu nombre.'); }
        STATE.user = await authRegister(email, pass, name, phone);
      } else {
        STATE.user = await authLogin(email, pass);
      }
      save();
      // Cargar datos guardados en Supabase
      await loadProfileFromSupabase(STATE.user.email);
      // Flujo: auth → setup → paywall → app
      if (!STATE.profile) {
        STATE.screen = 'setup';
      } else if (!STATE.user.paid) {
        STATE.screen = 'paywall';
      } else {
        STATE.screen = 'app';
      }
    } catch(e) {
      STATE.authError = e.message;
    }
    STATE.authLoading = false;
    render();
  };

  div.querySelector('#auth-pass')?.addEventListener('keydown', e => { if(e.key==='Enter') div.querySelector('#btn-auth')?.click(); });
  return div;
}

function renderSetup() {
  const wrap = document.createElement('div');
  wrap.className = 'setup-wrap';

  if (STATE.aiLoading) {
    wrap.innerHTML = `<div style="text-align:center;padding-top:60px"><div style="font-size:56px;margin-bottom:16px">🧠</div><div style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:var(--purple)">Generando tu plan…</div><div style="color:var(--muted);font-size:13px;margin-top:8px">Analizando con principios de Harvard</div><div style="display:flex;justify-content:center;gap:8px;margin-top:24px"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    return wrap;
  }

  const step = STEPS[STATE.setupStep];
  const pct = (STATE.setupStep/STEPS.length)*100;

  wrap.innerHTML = `
    <div class="screen-logo">🏋️</div>
    <div class="screen-title">Configura tu plan</div>
    <div class="screen-sub">Hola ${STATE.user?.name}! Cuéntanos sobre ti.</div>
    <div style="width:100%;max-width:440px;margin-top:20px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:var(--muted)">Configuración inicial</span>
        <span style="font-size:11px;color:var(--purple)">${STATE.setupStep+1}/${STEPS.length}</span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--purple),#7c3aed)"></div></div>
    </div>
    <div class="setup-card">
      <div style="font-size:12px;color:var(--purple);font-weight:700;margin-bottom:14px">Paso ${STATE.setupStep+1}</div>
      <div style="font-family:Syne,sans-serif;font-size:17px;font-weight:700;margin-bottom:20px;line-height:1.4">${step.q}</div>
      <div id="step-inp"></div>
      <button class="btn btn-purple" id="btn-next" style="margin-top:16px">${STATE.setupStep===STEPS.length-1?'🚀 Generar mi plan':'Continuar →'}</button>
      ${STATE.setupStep>0?`<button class="btn btn-ghost" id="btn-back">← Atrás</button>`:''}
    </div>`;

  const inp = wrap.querySelector('#step-inp');
  if (step.type==='select') {
    step.opts.forEach(o => {
      const b=document.createElement('button'); b.className='option-btn'+(STATE.setupData[step.key]===o?' selected':''); b.textContent=o;
      b.onclick=()=>{STATE.setupData[step.key]=o;render();};
      inp.appendChild(b);
    });
  } else {
    const el=document.createElement('input'); el.type=step.type; el.placeholder=step.ph; el.value=STATE.setupData[step.key]||''; el.style.cssText='width:100%';
    el.oninput=e=>STATE.setupData[step.key]=e.target.value;
    el.onkeydown=e=>{if(e.key==='Enter')wrap.querySelector('#btn-next')?.click();};
    inp.appendChild(el); setTimeout(()=>el.focus(),100);
  }

  wrap.querySelector('#btn-next').onclick = async () => {
    const val=STATE.setupData[step.key];
    if(step.key!=='bodyFat'&&!val){inp.querySelector('input,select')?.focus();return;}
    if(STATE.setupStep<STEPS.length-1){STATE.setupStep++;render();}
    else {
      const p=STATE.setupData;
      STATE.profile={...p,setup:true};
      
      // Guardar perfil en Supabase
      dbMarkSetupDone(STATE.user?.email, p.goal);
      if (supa) {
        await supa.from('users').update({
          goal: p.goal, age: parseInt(p.age), gender: p.gender,
          weight_initial: parseFloat(p.weight), weight: parseFloat(p.weight),
          height: parseFloat(p.height), target_weight: parseFloat(p.targetWeight),
          weeks_goal: parseInt(p.weeksGoal), activity_level: p.activityLevel,
          training_place: p.trainingPlace, body_fat: parseFloat(p.bodyFat)||null,
          setup_done: true, last_active: new Date().toISOString()
        }).eq('email', STATE.user?.email);
      }
      save();

      // Si NO ha pagado → paywall primero
      if (!STATE.user.paid) {
        STATE.screen = 'paywall';
        render();
        return;
      }

      // Si ya pagó → generar plan con IA y entrar a la app
      STATE.aiLoading=true; render();
      const desc=`${p.name}, ${p.age}años, ${p.gender}, ${p.weight}kg, ${p.height}cm, objetivo: ${p.goal}, meta: ${p.targetWeight}kg en ${p.weeksGoal} semanas, actividad: ${p.activityLevel}`;
      
      const withTimeout = (promise, ms) => Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
      ]);

      try {
        const planR = await withTimeout(
          claude([{role:'user',content:`Plan entrenamiento semanal para ${desc}, lugar de entrenamiento: ${p.trainingPlace||'gimnasio'}. ${getTrainingPrompt(p.trainingPlace)} Máx 250 palabras.`}]),
          25000
        );
        const nutR = await withTimeout(
          claude([{role:'user',content:`Plan alimentación diario para ${desc}. Formato: ## Desayuno, ## Colación AM, ## Almuerzo, ## Merienda PM, ## Cena. Solo alimentos con cantidades en gramos. NO incluir lista de compras, preparación ni recetas. Máx 200 palabras.`}]),
          25000
        );
        STATE.plan=planR;
        STATE.nutrition=nutR;
        STATE.planGeneratedAt=new Date().toISOString();
        STATE.screen='app';
        dbSavePlanNutrition(STATE.user?.email, STATE.plan, STATE.nutrition);
      } catch(e) {
        STATE.plan='⚠️ Hubo un problema generando tu plan. Toca "🔄 Nueva semana" en la sección Entrenamiento para generarlo.';
        STATE.nutrition='⚠️ Hubo un problema generando tu menú. Toca "🔄 Nuevo menú" en la sección Nutrición para generarlo.';
        STATE.screen='app';
      }
      STATE.aiLoading=false;
      save();
      render();
    }
  };
  wrap.querySelector('#btn-back')?.addEventListener('click',()=>{STATE.setupStep--;render();});
  return wrap;
}

function renderMiniChart(trend) {
  const weights=trend.map(t=>t.w),mn=Math.min(...weights)-1,mx=Math.max(...weights)+1;
  return `<div class="card"><div class="card-sh">📉 Tendencia de peso</div><div class="mini-chart">${trend.map(t=>{const h=Math.round(((t.w-mn)/(mx-mn))*40+8);return`<div class="bar-wrap"><div class="bar" style="height:${h}px"></div><div class="bar-lbl">${(t.date||'').slice(0,5)}</div></div>`;}).join('')}</div></div>`;
}

function matchExerciseKey(text) {
  const lower = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  let best=null, bestLen=0;
  for(const e of EXERCISE_MATCH){
    for(const k of e.kw){
      const n=k.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if(lower.includes(n)&&k.length>bestLen){best=e.key;bestLen=k.length;}
    }
  }
  return best;
}

function buildExerciseCard(name, detail, exKey) {
  const data = EXERCISE_IMAGES[exKey];
  if(!data) return '';
  const c = data.color;

  const imgData = hasImgs ? `data-imgs="${data.imgs.join(',')}" data-exname="${name}" data-muscle="${data.muscle}" data-color="${c}"` : '';
  return `<div class="ex-card" ${imgData} ${hasImgs ? 'onclick="openExerciseModal(this)"' : ''}>
    <div class="ex-card-accent" style="background:linear-gradient(180deg,${c},${c}40)"></div>

function formatPlanWithImages(planText) {
  if(!planText) return '';
  const lines = planText.split('\n');
  let html = '';
  for(const line of lines) {
    const trimmed = line.trim();
    if(!trimmed) { html += '<div style="height:6px"></div>'; continue; }
    // Detect day headers (## or ### or **DÍA)
    if(/^#{1,3}\s/.test(trimmed) || /^\*\*DÍA/i.test(trimmed) || /^DÍA\s/i.test(trimmed) || /^\*\*Día/i.test(trimmed)) {
      const clean = trimmed.replace(/^#+\s*/, '').replace(/\*\*/g, '').trim();
      html += `<div class="plan-section-title">${clean}</div>`;
      continue;
    }
    // Detect exercise lines (starts with - or number. or *)
    const exMatch = trimmed.match(/^[-–•*]\s*(.+)|^(\d+)[.)]\s*(.+)/);
    if(exMatch) {
      const exText = (exMatch[1] || exMatch[3] || '').replace(/\*\*/g,'').trim();
      const exKey = matchExerciseKey(exText);
      if(exKey) {
        // Parse name and detail (series, reps, etc.)
        // Try to split at first parenthesis or colon for detail
        let name = exText, detail = '';
        const parenIdx = exText.indexOf('(');
        const colonIdx = exText.indexOf(':');
        const dashIdx = exText.indexOf(' - ');
        if(parenIdx > 3) { name = exText.slice(0, parenIdx).trim(); detail = exText.slice(parenIdx).trim(); }
        else if(dashIdx > 3) { name = exText.slice(0, dashIdx).trim(); detail = exText.slice(dashIdx+3).trim(); }
        else if(colonIdx > 3) { name = exText.slice(0, colonIdx).trim(); detail = exText.slice(colonIdx+1).trim(); }
        html += buildExerciseCard(name, detail, exKey);
        continue;
      }
    }
    // Regular text line
    const formatted = trimmed.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^#+\s*/,'');
    html += `<div class="plan-text-line">${formatted}</div>`;
  }
  return html;
}

function matchFoodsInText(text) {
  const lower = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const found = [];
  const seen = new Set();
  for(const f of FOOD_MATCH) {
    for(const kw of f.kw) {
      const n = kw.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if(lower.includes(n) && !seen.has(f.key)) {
        seen.add(f.key);
        found.push(f.key);
        break;
      }
    }
  }
  return found;
}

function matchNutSection(text) {
  const lower = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const matches = [
    {key:"desayuno",kw:["desayuno","breakfast"]},
    {key:"almuerzo",kw:["almuerzo","lunch","comida principal","comida"]},
    {key:"cena",kw:["cena","dinner"]},
    {key:"snack",kw:["snack","merienda de la tarde"]},
    {key:"merienda",kw:["merienda","media mañana","media manana","media tarde"]},
    {key:"colacion",kw:["colación","colacion"]},
    {key:"pre_entreno",kw:["pre-entreno","pre entreno","pre entreno","antes de entrenar","pre-workout"]},
    {key:"post_entreno",kw:["post-entreno","post entreno","post entreno","después de entrenar","despues de entrenar","post-workout"]},
    {key:"calorias",kw:["calorías","calorias","deficit","superavit","macros diarios","macros"]},
    {key:"proteina",kw:["proteína total","proteina total"]},
    {key:"carbohidratos",kw:["carbohidrato total"]},
    {key:"grasas",kw:["grasa total"]},
    {key:"macros",kw:["distribución","distribucion","resumen nutricional","resumen macro"]},
    {key:"hidratacion",kw:["agua","hidratación","hidratacion"]},
    {key:"suplementos",kw:["suplemento"]},
  ];
  let best=null, bestLen=0;
  for(const m of matches){
    for(const k of m.kw){
      const n=k.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
      if(lower.includes(n)&&k.length>bestLen){best=m.key;bestLen=k.length;}
    }
  }
  return best;
}

function buildNutCard(name, items, nutKey) {
  const data = NUT_ITEMS[nutKey];
  if(!data) return '';
  const c = data.color;
  const allText = name + ' ' + (Array.isArray(items) ? items.join(' ') : items);
  const foods = matchFoodsInText(allText);
  const hasFoods = foods.length > 0;
  const foodData = hasFoods ? `data-foods="${foods.join(',')}" data-mealname="${name}" data-mealcolor="${c}"` : '';
  const itemsArr = Array.isArray(items) ? items : (items ? [items] : []);
  
  const itemsHtml = itemsArr.filter(Boolean).map(it => 
    `<div class="meal-card-item"><div class="meal-card-dot" style="background:${c}"></div>${it}</div>`
  ).join('');
  
  return `<div class="meal-card" style="border-color:${c}20" ${foodData} ${hasFoods ? 'onclick="openFoodModal(this)"' : ''}>
    <div class="meal-card-header">
      <div class="meal-card-icon">${data.icon}</div>

}

const SKIP_NUT = ["lista de compra","ingrediente","elaboración","elaboracion","preparación","preparacion","receta","instrucciones","pasos","modo de preparar","cómo preparar","como preparar"];
function shouldSkipSection(text) {
  const l = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  return SKIP_NUT.some(s => l.includes(s.normalize("NFD").replace(/[\u0300-\u036f]/g,"")));
}

function formatNutritionWithCards(nutText) {
  if(!nutText) return '';
  const lines = nutText.split('\n');
  let html = '';
  let currentMeal = null;
  let mealItems = [];
  let skipping = false;

  function flushMeal() {
    if(currentMeal && mealItems.length > 0) {
      html += buildNutCard(currentMeal.name, mealItems, currentMeal.key);
    } else if(currentMeal) {
      html += buildNutCard(currentMeal.name, [], currentMeal.key);
    }
    currentMeal = null;
    mealItems = [];
  }

  for(const line of lines) {
    const trimmed = line.trim();
    if(!trimmed) continue;
    if(trimmed.startsWith('|') || /^[-|]+$/.test(trimmed.replace(/\s/g,''))) continue;

    // Detect time-based headers: *07:00 - Desayuno (500 kcal) or **7:00 - Desayuno**
    const timeMatch = trimmed.match(/^\*{0,2}\s*\*?\s*(\d{1,2}:\d{2})\s*[-–]\s*(.+)/);
    if(timeMatch) {
      flushMeal();
      const mealLabel = timeMatch[2].replace(/\*\*/g,'').replace(/\([\d\s,kcal]+\)/gi,'').trim();
      const fullLabel = timeMatch[1] + ' - ' + timeMatch[2].replace(/\*\*/g,'').trim();
      if(shouldSkipSection(mealLabel)) { skipping = true; continue; }
      skipping = false;
      const nutKey = matchNutSection(mealLabel);
      if(nutKey) { currentMeal = {name: fullLabel, key: nutKey}; continue; }
      else { html += `<div class="plan-section-title nut">${fullLabel}</div>`; continue; }
    }

    const isHeader = /^#{1,3}\s/.test(trimmed) || /^\*\*[A-ZÁÉÍÓÚÑ🌅☀️🌙🍎⚡💪📊🔥🥤💧💊]/.test(trimmed);
    if(isHeader) {
      flushMeal();
      const clean = trimmed.replace(/^#+\s*/, '').replace(/\*\*/g, '').replace(/^[🌅☀️🌙🍎⚡💪📊🔥🥤💧💊🛒📝👩‍🍳]\s*/, '').trim();
      if(shouldSkipSection(clean)) { skipping = true; continue; }
      skipping = false;
      const nutKey = matchNutSection(clean);
      if(nutKey) { currentMeal = {name: clean, key: nutKey}; continue; }
      else { html += `<div class="plan-section-title nut">${clean}</div>`; continue; }
    }
    if(skipping) continue;

    const lineMatch = trimmed.match(/^[-–•*]\s*(.+)|^(\d+)[.)]\s*(.+)/);
    if(lineMatch) {
      const itemText = (lineMatch[1] || lineMatch[3] || '').replace(/\*\*/g,'').trim();
      // Check if this bullet is actually a meal header (e.g. "- *17:00 - Pre-entreno")
      const subTime = itemText.match(/^\*?\s*(\d{1,2}:\d{2})\s*[-–]\s*(.+)/);
      if(subTime) {
        flushMeal();
        const ml = subTime[2].replace(/\([\d\s,kcal]+\)/gi,'').trim();
        const fl = subTime[1] + ' - ' + subTime[2].trim();
        const nk = matchNutSection(ml);
        if(nk) { currentMeal = {name: fl, key: nk}; continue; }
      }
      if(currentMeal) { mealItems.push(itemText); continue; }
      const nutKey = matchNutSection(itemText);
      if(nutKey) {
        const ci = itemText.indexOf(':');
        if(ci > 2) html += buildNutCard(itemText.slice(0,ci).trim(), [itemText.slice(ci+1).trim()], nutKey);
        else html += buildNutCard(itemText, [], nutKey);
        continue;
      }
      // Non-matched bullet: still add as text
      if(!currentMeal) {
        html += `<div class="plan-text-line" style="padding-left:8px">• ${itemText}</div>`;
        continue;
      }
    }

    if(!currentMeal) {
      const nutKey2 = matchNutSection(trimmed);
      if(nutKey2 && (trimmed.includes(':') || /^[A-ZÁÉÍÓÚÑ🌅☀️🌙🍎⚡💪]/.test(trimmed))) {
        if(shouldSkipSection(trimmed)) { skipping = true; continue; }
        flushMeal();
        const ci = trimmed.indexOf(':');
        if(ci > 2) { currentMeal = {name: trimmed.slice(0,ci).replace(/\*\*/g,'').trim(), key: nutKey2}; const a=trimmed.slice(ci+1).replace(/\*\*/g,'').trim(); if(a) mealItems.push(a); }
        else { currentMeal = {name: trimmed.replace(/\*\*/g,'').trim(), key: nutKey2}; }
        continue;
      }
    }
    if(currentMeal) { mealItems.push(trimmed.replace(/\*\*/g,'').trim()); continue; }
    const formatted = trimmed.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^#+\s*/,'');
    html += `<div class="plan-text-line">${formatted}</div>`;
  }
  flushMeal();
  return html;
}
function getTrainingPrompt(tp) {
  if (tp?.includes('Ambos')) return 'Ejercicios para AMBOS contextos: indica para cada ejercicio la versión de gimnasio Y la alternativa para casa (sin equipamiento). Formato: "Ejercicio (Gym: X / Casa: Y)".';
  if (tp?.includes('casa')) return 'Ejercicios SIN equipamiento de gimnasio, solo peso corporal, bandas o materiales caseros.';
  return 'Ejercicios con equipamiento completo de gimnasio (pesas, máquinas, barras).';
}
function getWeekNumber() {
  if (!STATE.planGeneratedAt && STATE.dailyLogs.length === 0) return 1;
  const first = STATE.planGeneratedAt ? new Date(STATE.planGeneratedAt) : new Date();
  const now = new Date();
  const diffDays = Math.floor((now - first) / (1000*60*60*24));
  return Math.max(1, Math.ceil((diffDays + 1) / 7));
}
function getDaysUntilNewPlan() {
  if (!STATE.planGeneratedAt) return 0;
  const gen = new Date(STATE.planGeneratedAt);
  const now = new Date();
  const diffDays = Math.floor((now - gen) / (1000*60*60*24));
  return Math.max(0, 7 - diffDays);
}

// --- PROGRESS ---
function buildWeightChart(logs) {
  const withWeight = logs.filter(l => l.weight && parseFloat(l.weight) > 0).slice(0, 30).reverse();
  if (withWeight.length < 2) return '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">Registra tu peso diariamente para ver el gráfico 📊</div>';
  const weights = withWeight.map(l => parseFloat(l.weight));
  const dates = withWeight.map(l => l.date?.slice(0,5) || '');
  const mn = Math.min(...weights) - 0.5;
  const mx = Math.max(...weights) + 0.5;
  const W = 300, H = 120, pad = 30;
  const xScale = i => pad + (i / (withWeight.length - 1)) * (W - pad * 2);
  const yScale = v => H - pad - ((v - mn) / (mx - mn)) * (H - pad * 2);
  const points = weights.map((w, i) => `${xScale(i)},${yScale(w)}`).join(' ');
  const area = `${xScale(0)},${H-10} ` + weights.map((w,i) => `${xScale(i)},${yScale(w)}`).join(' ') + ` ${xScale(weights.length-1)},${H-10}`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#wg)"/>
    <polyline points="${points}" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${weights.map((w,i) => `<circle cx="${xScale(i)}" cy="${yScale(w)}" r="3.5" fill="#a78bfa"/>
    <text x="${xScale(i)}" y="${yScale(w)-8}" text-anchor="middle" font-size="9" fill="#a78bfa">${w}</text>`).join('')}
    ${weights.length > 1 ? dates.filter((_,i) => i === 0 || i === Math.floor(weights.length/2) || i === weights.length-1).map((d,_,arr) => {
      const origIdx = d === dates[0] ? 0 : d === dates[Math.floor(weights.length/2)] ? Math.floor(weights.length/2) : weights.length-1;
      return `<text x="${xScale(origIdx)}" y="${H-2}" text-anchor="middle" font-size="8" fill="#6b7280">${d}</text>`;
    }).join('') : ''}
  </svg>`;
}

  return div;
